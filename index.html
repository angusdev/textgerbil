<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TextGerbil — Single File Editor</title>
  <!-- CodeMirror CSS & JS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/sql/sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/shell/shell.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/yaml/yaml.min.js"></script>
  <!-- Quill Rich Text Editor CSS & JS -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <!-- markdown-it for Markdown preview -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@13/dist/markdown-it.min.js"></script>
  <!-- json-formatter-js for JSON tree preview -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/json-formatter-js@2.5.23/dist/json-formatter.css">
  <script src="https://cdn.jsdelivr.net/npm/json-formatter-js@2.5.23/dist/json-formatter.umd.js"></script>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if(window.tailwind){
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                500: '#2b8be6',
                600: '#1f74c6'
              }
            }
          }
        }
      };
    }
  </script>
  <style>
    :root{--accent:#2b8be6}
    html,body{height:100%;margin:0}
    textarea{width:100%;resize:none;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;border:1px solid #e2e8f0;border-radius:8px;background:white;color:inherit}
    #textEditor textarea, #richEditor textarea {flex:1;height:100%;padding:12px}
    .editor-instance{flex:1;width:100%;height:100%;display:none}
    .editor-instance.active{display:flex}
    .CodeMirror{flex:1;width:100%;height:100%;font-size:14px}
    .ql-container{flex:1;width:100%;height:100%;overflow:auto}
    .ql-editor{min-height:100%;padding:12px}
    .hidden{display:none}
    .settings label{font-size:13px}
    .btn{background:var(--accent);color:#fff;padding:6px 10px;border-radius:8px;border:none;cursor:pointer}
    .small{padding:6px 10px;font-size:13px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:#0f172a;cursor:pointer;display:inline-flex;align-items:center;gap:6px;line-height:1}
    .small:hover{background:#f8fafc}
    .small.is-active{background:var(--accent);border-color:var(--accent);color:#fff}
    .small:disabled{opacity:.45;color:#64748b;background:#f1f5f9;border-color:#e2e8f0;cursor:not-allowed;filter:saturate(.35)}
    .small:disabled:hover{background:#f1f5f9}
    .icon{width:14px;height:14px;display:inline-block}
    #previewResizeHandle{width:12px;cursor:col-resize;position:relative;touch-action:none}
    #previewResizeHandle::before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:2px;border-radius:2px;background:#cbd5e1}
    #previewResizeHandle:hover::before{background:#2b8be6}
    .note-card{position:relative;break-inside:avoid;margin-bottom:12px;background:white;border:1px solid #e2e8f0;border-radius:12px;display:flex;flex-direction:column;box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);transition:all 0.2s;overflow:hidden}
    .note-card:hover{box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);border-color:#cbd5e1}
    .note-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f8fafc;border-bottom:1px solid #e2e8f0}
    .note-body{padding:12px}
    .note-textarea{width:100%;resize:none;border:none !important;padding:0 !important;outline:none !important;box-shadow:none !important;background:transparent !important;font-size:14px;line-height:1.5;overflow:hidden}
    .note-delete{position:absolute;top:6px;right:8px}
    .add-tab-split{position:relative;display:inline-flex;align-items:stretch;height:34px;border:1px solid #cbd5e1;border-radius:10px;background:#fff}
    .add-tab-main,.add-tab-toggle{border:none;background:transparent;color:#334155;cursor:pointer;display:inline-flex;align-items:center}
    .add-tab-main{gap:6px;padding:0 10px;height:100%;font-size:13px;font-weight:600}
    .add-tab-toggle{width:30px;height:100%;justify-content:center;border-left:1px solid #e2e8f0}
    .add-tab-main:hover,.add-tab-toggle:hover{background:#f8fafc}
    .add-tab-menu{position:absolute;right:0;top:calc(100% + 6px);z-index:80;width:max-content;padding:6px;background:#fff;border:1px solid #cbd5e1;border-radius:10px;box-shadow:0 10px 20px rgba(15,23,42,.12)}
    .add-tab-option{width:100%;height:32px;border:none;border-radius:8px;background:transparent;color:#334155;display:flex;align-items:center;gap:6px;padding:0 8px;cursor:pointer;font-size:13px;text-align:left}
    .add-tab-option:hover{background:#f1f5f9}
    .add-tab-option .mode-label{margin-left:2px}
    .tab-remove-placeholder{flex:0 0 auto;height:34px;border-radius:10px;background:transparent;transition:width 0.22s ease, opacity 0.22s ease, margin 0.22s ease}
    .tab.drag-origin{opacity:.55}
    .tab.drag-origin-collapsed{position:absolute !important;visibility:hidden !important;pointer-events:none !important}
    .tab-drop-placeholder{flex:0 0 auto;height:34px;min-width:64px;border:2px dashed var(--accent);border-radius:10px;background:rgb(186 230 253 / 0.4);pointer-events:none}
    .tab-drag-ghost{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;box-shadow:0 10px 30px rgba(15,23,42,0.2);opacity:0.97;transform:translate3d(0,0,0);transition:none}
    .emoji-picker{position:fixed;z-index:10020;max-width:320px;max-height:320px;overflow:auto;padding:10px;background:#fff;border:1px solid #cbd5e1;border-radius:12px;box-shadow:0 12px 30px rgba(15,23,42,0.18)}
    .emoji-group-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:#64748b;margin:8px 0 4px}
    .emoji-grid{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:4px}
    .ql-font-arial{font-family:Arial,Helvetica,sans-serif}
    .ql-font-helvetica{font-family:Helvetica,Arial,sans-serif}
    .ql-font-times-new-roman{font-family:"Times New Roman",Times,serif}
    .ql-font-times{font-family:Times,"Times New Roman",serif}
    .ql-font-georgia{font-family:Georgia,serif}
    .ql-font-verdana{font-family:Verdana,Geneva,sans-serif}
    .ql-font-trebuchet-ms{font-family:"Trebuchet MS","Trebuchet",sans-serif}
    .ql-font-courier-new{font-family:"Courier New",Courier,monospace}
    .ql-font-lucida-console{font-family:"Lucida Console","Lucida Sans Typewriter",monospace}
    .ql-font-tahoma{font-family:Tahoma,Geneva,sans-serif}
    .ql-font-palatino{font-family:"Palatino Linotype","Book Antiqua",Palatino,serif}
    .ql-font-garamond{font-family:Garamond,"Times New Roman",serif}
    .ql-font-comic-sans-ms{font-family:"Comic Sans MS","Comic Sans",cursive}
    .ql-snow .ql-picker.ql-font{max-width:160px}
    .ql-snow .ql-picker.ql-font .ql-picker-label,
    .ql-snow .ql-picker.ql-font .ql-picker-item{font-size:12px}
    .ql-snow .ql-picker.ql-font .ql-picker-label{
      display:block;
      box-sizing:border-box;
      padding-right:14px;
    }
    .ql-snow .ql-picker.ql-font .ql-picker-label::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item::before{
      display:block;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="arial"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="arial"]::before{content:"Arial"}
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="helvetica"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="helvetica"]::before{content:"Helvetica"}
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="times-new-roman"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="times-new-roman"]::before{content:"Times New Roman"}
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="times"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="times"]::before{content:"Times"}
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="georgia"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="georgia"]::before{content:"Georgia"}
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="verdana"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="verdana"]::before{content:"Verdana"}
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="trebuchet-ms"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="trebuchet-ms"]::before{content:"Trebuchet MS"}
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="courier-new"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="courier-new"]::before{content:"Courier New"}
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="lucida-console"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="lucida-console"]::before{content:"Lucida Console"}
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="tahoma"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="tahoma"]::before{content:"Tahoma"}
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="palatino"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="palatino"]::before{content:"Palatino"}
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="garamond"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="garamond"]::before{content:"Garamond"}
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="comic-sans-ms"]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="comic-sans-ms"]::before{content:"Comic Sans MS"}
    .emoji-item{border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:18px;line-height:1;padding:6px}
    .emoji-item:hover{background:#e2e8f0}
    dialog::backdrop{background:rgba(15,23,42,0.5);backdrop-filter:blur(4px)}
    dialog[open]{animation:dialog-show 0.3s ease-out}
    @keyframes dialog-show{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  </style>
</head>
<body class="h-screen bg-slate-100 text-slate-900">
  <div class="app h-full flex flex-col bg-gradient-to-br from-slate-100 via-slate-50 to-sky-100">
    <header class="border-b border-slate-200 bg-white/90 px-3 py-2 backdrop-blur">
      <div class="flex items-center gap-3">
      <img src="images/textgerbil.png" alt="TextGerbil" class="h-16" />
      <div class="tabs flex min-w-0 items-center gap-2 overflow-hidden py-1" id="tabs"></div>
        <div class="add-tab-split shrink-0" id="addTabSplit" aria-label="New tab controls">
          <button id="addTabDefault" class="add-tab-main" aria-label="Add text tab" title="Add text tab">
            <span data-add-icon="plus" aria-hidden="true"></span>
          </button>
          <button id="addTabToggle" class="add-tab-toggle" aria-label="Show tab mode options" title="Choose tab mode">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div id="addTabMenu" class="add-tab-menu hidden" role="menu" aria-label="Tab mode menu">
            <button class="add-tab-option" data-mode="text" role="menuitem" title="Add text tab">
              <span data-add-icon="mode" data-mode-icon="text" aria-hidden="true"></span>
              <span class="mode-label">Text</span>
            </button>
            <button class="add-tab-option" data-mode="rich" role="menuitem" title="Add rich edit tab">
              <span data-add-icon="mode" data-mode-icon="rich" aria-hidden="true"></span>
              <span class="mode-label">Rich Edit</span>
            </button>
            <button class="add-tab-option" data-mode="notepad" role="menuitem" title="Add note tab">
              <span data-add-icon="mode" data-mode-icon="notepad" aria-hidden="true"></span>
              <span class="mode-label">Note</span>
            </button>
          </div>
        </div>
      </div>
    </header>
    <div class="bg-amber-50 border-b border-amber-100 px-3 py-3 text-base font-semibold text-amber-700 flex items-center justify-center gap-3">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M12 3 2 21h20L12 3z"/><path d="M12 9v6"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/></svg>
      <span>This is in experimental state, data may be erased permanent and not recoverable</span>
    </div>

    <main class="flex h-full min-h-0 flex-1 overflow-auto p-3">
      <section class="editor-area flex h-full min-w-0 flex-1 flex-col gap-2 rounded-xl border border-slate-200 bg-white p-3 shadow-sm">
        <div class="flex flex-wrap items-center gap-2">
          <div id="tabTitle" class="min-w-0 flex-1 font-semibold text-slate-800"></div>
          <div class="toolbar ml-auto flex flex-wrap items-center gap-2">
          <button id="emojiBtn" class="small" aria-label="Emoji picker" title="Emoji">
            <span aria-hidden="true">😊</span>
          </button>
          <select id="languageSelect" class="h-[30px] rounded-lg border border-slate-300 bg-white px-2 text-sm text-slate-800" title="Language" aria-label="Select language for syntax highlighting">
            <option value="detect">Detect</option>
            <option value="plain">Plain</option>
            <option value="css">CSS</option>
            <option value="htmlmixed">HTML</option>
            <option value="java">Java</option>
            <option value="javascript">JavaScript</option>
            <option value="json">JSON</option>
            <option value="markdown">Markdown</option>
            <option value="python">Python</option>
            <option value="shell">Shell</option>
            <option value="sql">SQL</option>
            <option value="xml">XML</option>
            <option value="yaml">YAML</option>
          </select>
          <button id="togglePreview" class="small" aria-label="Toggle preview" title="Preview">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button id="exportBtn" class="small" aria-label="Export file" title="Export">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
          </button>
          <button id="importBtn" class="small" aria-label="Import file" title="Import">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 21V9"/><path d="m17 14-5-5-5 5"/><path d="M5 3h14"/></svg>
          </button>
          </div>
          <div class="text-sm text-slate-600"><button id="themeBtn" class="small" aria-label="Settings" title="Settings"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.2a1.7 1.7 0 0 0 1 1.5h.1a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.2a1.7 1.7 0 0 0-1.5 1z"/></svg></button></div>
          <input type="file" id="importFile" class="hidden" accept="*/*" aria-hidden="true" />
        </div>
        <div class="editor flex min-h-0 min-w-0 flex-1 overflow-hidden rounded-lg border border-slate-200 bg-white">
          <div id="textEditor" class="editor-instance active"></div>
          <div id="richEditor" class="editor-instance flex-col"></div>
          <div id="notepadEditor" class="editor-instance flex-col gap-4 overflow-auto p-4">
            <button id="addNoteBtn" class="small btn" style="align-self:flex-start">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
              <span>Note</span>
            </button>
            <div id="notesContainer" class="columns-1 sm:columns-2 lg:columns-3 gap-4"></div>
          </div>
          <div id="previewResizeHandle" class="hidden mx-1 shrink-0 rounded" role="separator" aria-orientation="vertical" aria-label="Resize preview pane"></div>
          <aside class="sidebar hidden h-full min-h-0 self-stretch flex w-[360px] shrink-0 flex-col gap-2 overflow-auto border-l border-slate-200 bg-white p-3" id="preview">
            <div class="font-bold text-slate-800">Preview</div>
            <div id="previewContent" class="flex min-h-0 flex-1 overflow-auto pt-1 text-slate-700"></div>
          </aside>
        </div>
        <div class="settings grid grid-cols-1 gap-2 border-t border-slate-200 pt-2 md:grid-cols-2" id="settingsPanel" style="display:none">
          <label class="text-sm text-slate-700">Font family: <input class="mt-1 w-full rounded-lg border border-slate-300 px-2 py-1 text-sm" id="fontFamily" placeholder="e.g. Inter, monospace"/></label>
          <label class="text-sm text-slate-700">Font size: <input class="mt-1 w-full rounded-lg border border-slate-300 px-2 py-1 text-sm" id="fontSize" type="number" min="10" max="48" value="14"/></label>
          <label class="text-sm text-slate-700">Background: <input class="mt-1 h-9 w-full rounded-lg border border-slate-300 px-1" id="bgColor" type="color" value="#ffffff"/></label>
          <label class="text-sm text-slate-700">Foreground: <input class="mt-1 h-9 w-full rounded-lg border border-slate-300 px-1" id="fgColor" type="color" value="#111111"/></label>
          <div style="margin-top:8px"><button id="applyTheme" class="btn small"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg><span>Apply to current</span></button> <button id="applyGlobal" class="small"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg><span>Apply to all</span></button></div>
        </div>
      </section>

    </main>

    <dialog id="confirmDialog" class="p-0 rounded-2xl border border-slate-200 shadow-2xl overflow-hidden">
      <div class="p-6 w-[340px] flex flex-col gap-4 bg-white">
        <div class="flex flex-col gap-2">
          <h3 id="dialogTitle" class="text-lg font-bold text-slate-900 leading-none">Confirm Action</h3>
          <p id="dialogMessage" class="text-sm text-slate-600 leading-relaxed">Are you sure you want to proceed?</p>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button id="dialogCancel" class="px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-100 rounded-xl transition-all">Cancel</button>
          <button id="dialogConfirm" class="px-4 py-2 text-sm font-semibold text-white bg-rose-500 hover:bg-rose-600 active:scale-95 rounded-xl shadow-lg shadow-rose-200 transition-all">Confirm</button>
        </div>
      </div>
    </dialog>
    <div id="emojiPicker" class="emoji-picker hidden" role="dialog" aria-label="Emoji picker"></div>
  </div>

  <script>
    const STORAGE_KEY = 'textgerbil_v1_tabs'
    const STORAGE_GLOBAL = 'textgerbil_v1_global'
    let tabs = []
    let activeId = null
    let globalTheme = null
    let editors = {} // store editor instances: {tabId: {cm, quill, ...}}
    let emojiPickerOpen = false
    let lastEmojiTarget = null

      if(el.tagName==='INPUT' || el.tagName==='TEXTAREA')return true;

    function findPreferredEmojiTarget(){

      if(isEditableTarget(active))return active;

    function insertEmojiIntoTarget(emoji,target){
      if(!target)return false;
      if(target.tagName==='INPUT' || target.tagName==='TEXTAREA'){
        target.focus();
        const start = Number.isFinite(target.selectionStart) ? target.selectionStart : target.value.length;
        const end = Number.isFinite(target.selectionEnd) ? target.selectionEnd : start;
        target.value = `${target.value.slice(0,start)}${emoji}${target.value.slice(end)}`;
        const cursor = start + emoji.length;
        if(typeof target.setSelectionRange==='function') target.setSelectionRange(cursor,cursor);
        target.dispatchEvent(new Event('input',{bubbles:true}));
        target.focus();
        return true;
      }
      if(target.isContentEditable){
        target.focus();
        if(document.execCommand){
          document.execCommand('insertText',false,emoji);
          return true;
        }
      }
      return false;
    }

    function insertEmojiIntoTextEditor(emoji){
      const t=tabs.find(x=>x.id===activeId);
      if(!t || t.mode!=='text')return false;
      const ed = editors[t.id];
      if(!ed || !ed.cm || typeof ed.cm.replaceSelection!=='function')return false;
      ed.cm.focus();
      ed.cm.replaceSelection(emoji,'end');
      t.content = ed.cm.getValue();
      save();
      updatePreview();
      return true;
    }

    function insertEmojiIntoRichEditor(emoji){
      const t=tabs.find(x=>x.id===activeId);
      if(!t || t.mode!=='rich')return false;
      const ed = editors[t.id];
      if(!ed || !ed.quill)return false;
      if(typeof ed.quill.insertText==='function'){
        const range = typeof ed.quill.getSelection==='function' ? ed.quill.getSelection(true) : null;
        const index = range && Number.isFinite(range.index) ? range.index : (typeof ed.quill.getLength==='function' ? Math.max(0,ed.quill.getLength()-1) : 0);
        ed.quill.insertText(index,emoji,'user');
        if(typeof ed.quill.setSelection==='function') ed.quill.setSelection(index + emoji.length,0,'silent');
      }else if(ed.quill.root){
        ed.quill.root.innerHTML = (ed.quill.root.innerHTML || '') + emoji;
      }else {
        return false;
      }
      if(t){
        t.content = (ed.quill.root ? ed.quill.root.innerHTML : t.content) || '';
        save();
      }
      updatePreview();
      return true;
    }

    function buildSandboxedPreviewIframe(htmlBody){
      const iframe=document.createElement('iframe');
      iframe.style.width='100%';
      iframe.style.height='100%';
      iframe.style.border='0';
      iframe.setAttribute('scrolling','yes');
      iframe.setAttribute('sandbox','');
      iframe.referrerPolicy='no-referrer';
      iframe.srcdoc='<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="Content-Security-Policy" content="default-src \'none\'; img-src data:; style-src \'unsafe-inline\'; font-src data:; connect-src \'none\'; media-src \'none\'; object-src \'none\'; base-uri \'none\'; form-action \'none\'"><style>html,body{margin:0;padding:10px;color:#0f172a;background:#fff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;line-height:1.5}pre{white-space:pre-wrap;word-break:break-word}</style></head><body>'+htmlBody+'</body></html>';
      return iframe;
    }

    function swapPreviewIframe(pv,htmlBody){
      const token = ++previewSwapToken;
      const iframe = buildSandboxedPreviewIframe(htmlBody);
      const oldIframe = pv.querySelector('iframe');
      if(previewPendingIframe && previewPendingIframe !== oldIframe){
        if(previewPendingIframe.parentNode) previewPendingIframe.parentNode.removeChild(previewPendingIframe);
      }
      previewPendingIframe = iframe;
      if(window.__TEXTGERBIL_HEADLESS || !oldIframe){
        pv.innerHTML='';
        pv.appendChild(iframe);
        previewPendingIframe = null;
        return;
      }
      if(!pv.style.position) pv.style.position = 'relative';
      const pvStyle = window.getComputedStyle ? getComputedStyle(pv) : null;
      const padTop = pvStyle ? pvStyle.paddingTop : '0px';
      const padRight = pvStyle ? pvStyle.paddingRight : '0px';
      const padBottom = pvStyle ? pvStyle.paddingBottom : '0px';
      const padLeft = pvStyle ? pvStyle.paddingLeft : '0px';
      if(!('previewOverflow' in pv.dataset)){
        pv.dataset.previewOverflow = pv.style.overflow || '';
      }
      pv.style.overflow = 'hidden';
      iframe.style.position='absolute';
      iframe.style.top=padTop;
      iframe.style.right=padRight;
      iframe.style.bottom=padBottom;
      iframe.style.left=padLeft;
      iframe.style.opacity='0';
      iframe.style.transition='opacity 120ms ease';
      iframe.style.pointerEvents='none';
      pv.appendChild(iframe);
      let settled = false;
      const finalize = ()=>{
        if(settled) return;
        settled = true;
        if(token !== previewSwapToken){
          if(iframe.parentNode) iframe.parentNode.removeChild(iframe);
          if(previewPendingIframe === iframe) previewPendingIframe = null;
          return;
        }
        requestAnimationFrame(()=>{iframe.style.opacity='1';});
        const cleanup = ()=>{
          if(token !== previewSwapToken) return;
          if(oldIframe && oldIframe.parentNode) oldIframe.parentNode.removeChild(oldIframe);
          if('previewOverflow' in pv.dataset){
            pv.style.overflow = pv.dataset.previewOverflow || '';
            delete pv.dataset.previewOverflow;
          }
          iframe.style.position='';
          iframe.style.top='';
          iframe.style.right='';
          iframe.style.bottom='';
          iframe.style.left='';
          iframe.style.pointerEvents='';
          iframe.removeEventListener('transitionend',cleanup);
          if(previewPendingIframe === iframe) previewPendingIframe = null;
        };
        iframe.addEventListener('transitionend',cleanup);
        setTimeout(cleanup,200);
      };
      const timer = setTimeout(finalize,PREVIEW_SWAP_TIMEOUT_MS);
      iframe.addEventListener('load',()=>{
        clearTimeout(timer);
        finalize();
      },{once:true});
    }

    function clampPreviewWidthForTab(tab,width){
      const base = Number(width);
      const minClamped = Number.isFinite(base) ? Math.max(MIN_PREVIEW_WIDTH,Math.round(base)) : DEFAULT_PREVIEW_WIDTH;
      const main = document.querySelector('main');
      if(!main || !tab || tab.mode!=='text' || !canTabPreview(tab))return minClamped;
      const mainRect = main.getBoundingClientRect();
      const maxByEditor = Math.max(MIN_PREVIEW_WIDTH,Math.floor(mainRect.width - MIN_EDITOR_WIDTH - 8));
      return Math.min(minClamped,maxByEditor);
    }

    function animateTabShift(beforeMap,afterMap){
      if(!beforeMap || !afterMap)return;
      afterMap.forEach((afterRect,el)=>{
        const beforeRect = beforeMap.get(el);
        if(!beforeRect)return;
        const dx = Math.round(beforeRect.left - afterRect.left);
        const dy = Math.round(beforeRect.top - afterRect.top);
        if(dx===0 && dy===0)return;
        el.style.transition = 'none';
        el.style.transform = `translate(${dx}px, ${dy}px)`;
        requestAnimationFrame(()=>{
          el.style.transition = 'transform 0.2s ease';
          el.style.transform = '';
        });
      });
    }

    function setTabSnapPreview(targetIndex,insertBefore,verticalBufferActive=false){
      if(targetIndex===snappedTabIndex && insertBefore===snappedBefore)return;
      const tabElsBefore = Array.from(document.querySelectorAll('#tabs .tab'));
      const beforeRects = collectTabRects(tabElsBefore);
      snappedTabIndex = targetIndex;
      snappedBefore = !!insertBefore;
      clearTabSnapPreview();

      if(tabsEl){
        if(!tabDropPlaceholder){
          tabDropPlaceholder = document.createElement('div');
          tabDropPlaceholder.className = 'tab-drop-placeholder';

        tabDropPlaceholder.dataset.buffered = verticalBufferActive ? 'true' : 'false';
        const placeholderWidth = Math.max(64,Math.round(draggedTabWidth || 0));
        tabDropPlaceholder.style.width = `${placeholderWidth}px`;
        const tabElsAfterInsertion = Array.from(tabsEl.querySelectorAll('.tab'));
        if(snappedTabIndex!==null && tabElsAfterInsertion[snappedTabIndex]){
          if(snappedBefore) tabsEl.insertBefore(tabDropPlaceholder,tabElsAfterInsertion[snappedTabIndex]);
          else tabsEl.insertBefore(tabDropPlaceholder,tabElsAfterInsertion[snappedTabIndex].nextSibling);
        }else {
          tabsEl.appendChild(tabDropPlaceholder);
        }
      }
      const tabElsAfter = Array.from(document.querySelectorAll('#tabs .tab'));
      if(draggedTabIndex!==null && tabElsAfter[draggedTabIndex]){
        tabElsAfter[draggedTabIndex].classList.add('drag-origin');
        tabElsAfter[draggedTabIndex].classList.add('drag-origin-collapsed');
      }
      if(snappedTabIndex!==null && tabElsAfter[snappedTabIndex]){
        tabElsAfter[snappedTabIndex].classList.add(snappedBefore?'snap-before':'snap-after');
      }
      const afterRects = collectTabRects(tabElsAfter);
      animateTabShift(beforeRects,afterRects);

    function updateTabSnapFromPointer(clientX,clientY){
      if(draggedTabIndex===null)return;
      const tabEls = Array.from(document.querySelectorAll('#tabs .tab'));
      const candidates = tabEls.map((el,idx)=>({el,idx})).filter(item=>item.idx!==draggedTabIndex);
      const tabsEl = document.getElementById('tabs');
      let verticalBufferActive = false;
      if(tabsEl && Number.isFinite(clientY)){
        const rect = tabsEl.getBoundingClientRect();
        const topLimit = rect.top - TAB_Y_BUFFER;
        const bottomLimit = rect.bottom + TAB_Y_BUFFER;
        const abortBottom = rect.bottom + TAB_DRAG_ABORT_BUFFER;
        verticalBufferActive = clientY < topLimit || clientY > bottomLimit;
        if(clientY > abortBottom){
          if(!pointerAbortActive){
            pointerAbortActive = true;
            updateDragGhostCursor();
          }
          return;
        }
        if(pointerAbortActive){
          pointerAbortActive = false;
          updateDragGhostCursor();
        }
      }
      if(candidates.length===0){
        setTabSnapPreview(draggedTabIndex,true,verticalBufferActive);
        return;
      }
      const safeX = Number.isFinite(clientX) ? clientX : Number.POSITIVE_INFINITY;
      let targetIndex = null;
      let before = true;
      for(const item of candidates){
        const rect = item.el.getBoundingClientRect();
        const midpoint = rect.left + (rect.width/2);
        if(safeX < midpoint){
          targetIndex = item.idx;
          before = true;
          break;
        }
      }
      if(targetIndex===null){
        targetIndex = candidates[candidates.length - 1].idx;
        before = false;
      }
      setTabSnapPreview(targetIndex,before,verticalBufferActive);
    }

      let targetIndex = snappedTabIndex===null ? fallbackIndex : snappedTabIndex + (snappedBefore ? 0 : 1);
      if(draggedTabIndex!==null && targetIndex>draggedTabIndex) targetIndex--;
      return targetIndex;
    }

    function finalizePointerDrag(originIndex){

        return;
      }
      const insertIndex = getSnappedInsertIndex(originIndex);
      if(insertIndex!==draggedTabIndex){
        const dropTargetRect = getDropTargetRect();
        animateTabDragGhostToRect(dropTargetRect,()=>{
          commitTabReorder(originIndex);
        });
        return;
      }
      resetTabDragState();
      setTimeout(()=>{
        pointerDragSuppressNextClick = false;
      },0);
    }

    function showTabDragGhost(tabEl){
      hideTabDragGhost();
      if(!tabEl)return;
      tabDragGhost = tabEl.cloneNode(true);
      tabDragGhost.classList.add('tab-drag-ghost');
      tabDragGhost.style.width = `${tabEl.getBoundingClientRect().width}px`;
      tabDragGhost.style.height = `${tabEl.getBoundingClientRect().height}px`;
      tabDragGhost.style.left = '0';
      tabDragGhost.style.top = '0';
      document.body.appendChild(tabDragGhost);
      updateTabDragGhostPosition(pointerDragStartX,pointerDragStartY);
    }

    function updateTabDragGhostPosition(clientX,clientY){
      if(!tabDragGhost)return;
      const x = Number.isFinite(clientX) ? clientX - pointerGhostOffsetX : 0;
      const y = Number.isFinite(clientY) ? clientY - pointerGhostOffsetY : 0;
      tabDragGhost.style.transform = 'none';
      tabDragGhost.style.left = `${x}px`;
      tabDragGhost.style.top = `${y}px`;
      tabDragGhost.style.transition = 'none';
    }

    function hideTabDragGhost(){
      if(!tabDragGhost)return;
      tabDragGhost.remove();
      tabDragGhost = null;
    }

    function animateTabDragGhostToRect(targetRect,onComplete){
      if(!tabDragGhost || !targetRect){
        if(onComplete) onComplete();
        return;
      }
      const canAnimate = typeof window!=='undefined' && typeof window.requestAnimationFrame==='function';
      if(!canAnimate){
        tabDragGhost.style.left = `${targetRect.left}px`;
        tabDragGhost.style.top = `${targetRect.top}px`;
        if(onComplete) onComplete();
        return;
      }
      let didFinish = false;
      const finish = ()=>{
        if(didFinish)return;
        didFinish = true;
        tabDragGhost.removeEventListener('transitionend', onTransitionEnd);
        tabDragGhost.style.transition = 'none';
        tabDragGhost.style.opacity = '';
        if(onComplete) onComplete();
      };
      const onTransitionEnd = (event)=>{
        if(event.target !== tabDragGhost)return;
        finish();
      };
      tabDragGhost.addEventListener('transitionend', onTransitionEnd);
      tabDragGhost.style.transition = 'left 0.18s ease, top 0.18s ease, opacity 0.18s ease';
      tabDragGhost.style.opacity = '0.7';
      window.requestAnimationFrame(()=>{
        tabDragGhost.style.left = `${targetRect.left}px`;
        tabDragGhost.style.top = `${targetRect.top}px`;
      });
      setTimeout(finish, 220);
    }

    function getDropTargetRect(){
      if(tabDropPlaceholder){
        const rect = tabDropPlaceholder.getBoundingClientRect();
        if(rect && rect.width>0 && rect.height>0) return rect;
      }
      return dragOriginRect;
    }

    function returnTabDragGhostToOrigin(onComplete){
      animateTabDragGhostToRect(dragOriginRect,onComplete);
    }

    function commitTabReorder(originIndex){
      const insertIndex = getSnappedInsertIndex(originIndex);
      if(insertIndex!==draggedTabIndex){
        const moved=tabs.splice(draggedTabIndex,1)[0];
        tabs.splice(insertIndex,0,moved);
        save();
        renderTabs();
      }
      resetTabDragState();
      setTimeout(()=>{
        pointerDragSuppressNextClick = false;
      },0);
    }

    function updateDragGhostCursor(){
      if(tabDragGhost){
        tabDragGhost.style.cursor = pointerAbortActive ? 'not-allowed' : 'grabbing';
      }
      document.body.style.cursor = pointerAbortActive ? 'not-allowed' : '';
    }

    function handleTabPointerDown(ev,index,tabEl){
      if(ev.button!==0)return;
      if(ev.target && ev.target.closest && ev.target.closest('.close'))return;
      if(pointerDragPointerId!==null)return;
      pointerDragPointerId = ev.pointerId===undefined ? null : ev.pointerId;
      pointerDragStartX = Number.isFinite(ev.clientX) ? ev.clientX : 0;
      pointerDragStartY = Number.isFinite(ev.clientY) ? ev.clientY : 0;
      const tabRect = tabEl.getBoundingClientRect();
      pointerGhostOffsetX = Number.isFinite(pointerDragStartX) ? Math.min(Math.max(pointerDragStartX - tabRect.left,0),tabRect.width) : tabRect.width / 2;
      pointerGhostOffsetY = Number.isFinite(pointerDragStartY) ? Math.min(Math.max(pointerDragStartY - tabRect.top,0),tabRect.height) : tabRect.height / 2;
      pointerAbortActive = false;
      pointerIsDragging = false;
      pointerDragSuppressNextClick = false;
      const moveHandler = (moveEv)=>{
        if(pointerDragPointerId!==null && moveEv.pointerId!==pointerDragPointerId)return;
        const dx = Math.abs(moveEv.clientX - pointerDragStartX);
        const dy = Math.abs(moveEv.clientY - pointerDragStartY);
        if(!pointerIsDragging && Math.max(dx,dy) >= TAB_DRAG_THRESHOLD){
          pointerIsDragging = true;
          pointerDragSuppressNextClick = true;
          beginPointerDrag(index,tabEl);
        }
        if(pointerIsDragging){
          updateTabDragGhostPosition(moveEv.clientX,moveEv.clientY);
          updateTabSnapFromPointer(moveEv.clientX,moveEv.clientY);
          moveEv.preventDefault();
        }
      };
      const endHandler = (endEv)=>{
        if(pointerDragPointerId!==null && endEv.pointerId!==pointerDragPointerId)return;
        document.removeEventListener('pointermove',moveHandler);
        document.removeEventListener('pointerup',endHandler);
        document.removeEventListener('pointercancel',endHandler);
        pointerDragPointerId = null;
        if(pointerIsDragging){
          finalizePointerDrag(index);
        }else {
          resetTabDragState();
        }
      };
      document.addEventListener('pointermove',moveHandler);
      document.addEventListener('pointerup',endHandler);
      document.addEventListener('pointercancel',endHandler);
      ev.preventDefault();
    }

    function resetTabDragState(){
      draggedTabIndex = null;
      snappedTabIndex = null;
      snappedBefore = true;
      draggedTabWidth = 0;
      clearTabSnapPreview();
      hideTabDragGhost();
      pointerDragPointerId = null;
      pointerIsDragging = false;
      pointerDragStartX = 0;
      pointerDragStartY = 0;
      pointerAbortActive = false;
      dragOriginRect = null;
    }

    function getTabModeIconSvg(mode){
      if(mode==='rich') return '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
      if(mode==='notepad') return '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M8 2h8v4H8z"/><path d="M6 6h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z"/><path d="M8 11h8"/><path d="M8 15h5"/></svg>';
      return '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
    }

    function renderTabs(){
      const el=document.getElementById('tabs');
      el.innerHTML='';
      tabs.forEach((t,i)=>{
        const d=document.createElement('div');
        const base='tab group inline-flex min-w-0 flex-initial cursor-pointer select-none items-center gap-2 rounded-lg border px-3 py-1.5 text-sm font-medium transition';
        const state=t.id===activeId?' border-brand-500 bg-sky-50 text-sky-700 shadow-sm':' border-slate-300 bg-white text-slate-700 hover:border-slate-400 hover:bg-slate-50';
        d.className=base+state;
        d.dataset.tabId = t.id;
        d.addEventListener('pointerdown',(e)=>handleTabPointerDown(e,i,d));
        const iconSpan=document.createElement('span');
        iconSpan.className='shrink-0 inline-flex items-center';
        iconSpan.innerHTML=getTabModeIconSvg(t.mode);
        d.appendChild(iconSpan);
        const titleSpan=document.createElement('span');
        titleSpan.className='min-w-0 truncate';
        titleSpan.textContent=t.title||getDefaultTitleForMode(t.mode);
        d.appendChild(titleSpan);
        const closeSpan=document.createElement('span');
        closeSpan.className='close shrink-0 text-slate-400 hover:text-rose-500';
        closeSpan.textContent='×';
        closeSpan.title='Close';
        closeSpan.onclick=(e)=>{e.stopPropagation();try {closeTab(t.id,e.currentTarget);}catch (err){console.error('closeTab error',err);}};
        d.appendChild(closeSpan);
        d.onclick=(e)=>{
          if(pointerDragSuppressNextClick){
            pointerDragSuppressNextClick=false;
            return;
          }
          if(e.detail===1) selectTab(t.id);
        };
        el.appendChild(d);
      });
    }

    function ensureAtLeastOne(){if(tabs.length===0){tabs.push({id:uid(),title:'Text',mode:'text',language:'plain',content:'',theme:{},previewVisible:false,previewWidth:DEFAULT_PREVIEW_WIDTH});activeId=tabs[0].id}}

    function normalizeLoadedTab(rawTab){
      if(!rawTab || typeof rawTab!=='object')return null;
      const tab = Object.assign({},rawTab);
      tab.id = tab.id || uid();
      tab.mode = ['text','rich','notepad'].includes(tab.mode) ? tab.mode : 'text';
      const fallbackTitle = tab.mode==='rich' ? 'Doc' : tab.mode==='notepad' ? 'Note' : 'Text';
      tab.title = (tab.title||fallbackTitle).toString();
      tab.content = typeof tab.content==='string' ? tab.content : '';
      tab.theme = (tab.theme && typeof tab.theme==='object') ? tab.theme : {};
      if(tab.mode==='text'){
        tab.language = tab.language || 'detect';
      }else {
        tab.language = tab.language || 'plain';
      }
      if(typeof tab.previewVisible!=='boolean') tab.previewVisible=false;
      const parsedPreviewWidth = Number(tab.previewWidth);
      tab.previewWidth = Number.isFinite(parsedPreviewWidth) ? Math.max(MIN_PREVIEW_WIDTH,Math.round(parsedPreviewWidth)) : DEFAULT_PREVIEW_WIDTH;
      return tab;
    }

    function selectTab(id){
      const t=tabs.find(x=>x.id===id);
      if(!t)return;
      if(activeId && activeId!==id) saveCurrentEditor();
      activeId=id;
      document.getElementById('tabTitle').textContent=t.title;
      if(t.mode==='text'){
        document.getElementById('languageSelect').value=t.language || 'detect';
        document.getElementById('languageSelect').disabled = false;
      }
      applyPreviewWidth(t);
      switchEditorMode(t.mode,id);
      setEditorContent(t.content||'');
      applyThemeToEditor(t.theme);
      renderTabs();
      updatePreview();
      save();
      // restore cursor and focus editor after rendering
      setTimeout(()=>restoreCursorAndFocus(t),50);
    }

    function restoreCursorAndFocus(tab){
      if(!tab)return;
      if(tab.mode==='text'){
        const ed=editors[tab.id];
        if(ed && ed.cm){
          if(tab.cursor && typeof ed.cm.setCursor==='function') ed.cm.setCursor(tab.cursor);
          if(typeof ed.cm.focus==='function') ed.cm.focus();
        }
        return;
      }
      if(tab.mode==='rich'){
        const ed=editors[tab.id];
        if(ed && ed.quill){
          if(tab.cursor && typeof ed.quill.setSelection==='function'){
            const index = Number.isFinite(tab.cursor.index) ? tab.cursor.index : 0;
            const length = Number.isFinite(tab.cursor.length) ? tab.cursor.length : 0;
            ed.quill.setSelection(index,length,'silent');
          }
          if(typeof ed.quill.focus==='function') ed.quill.focus();
          else if(ed.quill.root && typeof ed.quill.root.focus==='function') ed.quill.root.focus();
        }
        return;
      }
      if(tab.mode==='notepad'){
        if(tab.cursor){
          const area=document.querySelector(`#notesContainer textarea[data-note-id="${tab.cursor.noteId}"]`);
          if(area){
            area.focus();
            area.setSelectionRange(tab.cursor.start||0,tab.cursor.end||0);
            return;
          }
        }
        const area=document.querySelector('#notesContainer textarea');
        if(area){
          area.focus();
          const end=area.value.length;
          area.setSelectionRange(end,end);
        }
      }
    }

    function getNextModeTabTitle(mode,baseTitle){
      let maxSuffix = -1;
      tabs.forEach(tab=>{
        if(!tab || tab.mode!==mode)return;
        const title = typeof tab.title==='string' ? tab.title.trim() : '';
        if(title === baseTitle){
          maxSuffix = Math.max(maxSuffix,0);
          return;
        }
        const match = title.match(new RegExp(`^${baseTitle}\\s+(\\d+)$`));
        if(!match)return;
        const suffix = Number.parseInt(match[1],10);
        if(Number.isFinite(suffix)) maxSuffix = Math.max(maxSuffix,suffix);
      });
      if(maxSuffix < 0) return baseTitle;
      return `${baseTitle} ${maxSuffix + 1}`;
    }

    function isMeaningfulRichContent(html){
      if(typeof html!=='string')return false;
      const normalized = html
        .replace(/<p><br><\/p>/gi,'')
        .replace(/<br\s*\/?>/gi,'')
        .replace(/&nbsp;/gi,' ')
        .replace(/<[^>]+>/g,'')
        .trim();
      return !!normalized;
    }

    function newTab(mode='text'){
      saveCurrentEditor();
      let title = getDefaultTitleForMode(mode);
      if(mode==='text') title = getNextModeTabTitle('text','Text');
      else if(mode==='rich') title = getNextModeTabTitle('rich','Doc');
      else if(mode==='notepad') title = getNextModeTabTitle('notepad','Note');
      const t={id:uid(),title,mode,language:'detect',content:'',theme:{},previewVisible:false,previewWidth:DEFAULT_PREVIEW_WIDTH};
      if(mode==='notepad') t.notepadData=[];
      if(globalTheme){t.theme=Object.assign({},globalTheme);} // inherit global
      tabs.push(t);
      activeId=t.id;
      renderTabs();
      selectTab(t.id);
      save();
    }

    function animateTabRemoval(tabId,onComplete){
      const tabEl = document.querySelector(`#tabs .tab[data-tab-id="${tabId}"]`);
      if(!tabEl){
        if(typeof onComplete === 'function') onComplete();
        return;
      }
      const rect = tabEl.getBoundingClientRect();
      const placeholder = document.createElement('div');
      placeholder.className = 'tab-remove-placeholder';
      placeholder.style.width = `${Math.round(rect.width)}px`;
      placeholder.style.opacity = '1';
      tabEl.replaceWith(placeholder);
      let finished = false;
      const cleanup = ()=>{
        if(finished)return;
        finished = true;
        placeholder.removeEventListener('transitionend',onEnd);
        if(placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
        if(typeof onComplete === 'function') onComplete();
      };
      const onEnd = (ev)=>{
        if(ev.target !== placeholder) return;
        if(ev.propertyName !== 'width') return;
        cleanup();
      };
      placeholder.addEventListener('transitionend',onEnd);
      requestAnimationFrame(()=>{
        placeholder.style.width = '0px';
        placeholder.style.opacity = '0';
        placeholder.style.margin = '0';
      });
      setTimeout(cleanup,260);
    }

    function closeTab(id,targetEl=null){
      const t = tabs.find(x=>x.id===id);
      const title = t ? t.title : getDefaultTitleForMode(t && t.mode);
      const hasMeaningfulNotepadContent = (tab)=>{
        if(!tab || tab.mode!=='notepad' || !Array.isArray(tab.notepadData))return false;
        return tab.notepadData.some(note=>{
          if(!note)return false;
          const noteTitle = typeof note.title==='string' ? note.title.trim() : '';
          const noteText = typeof note.text==='string' ? note.text.trim() : '';
          return !!(noteTitle || noteText);
        });
      };
      const executeClose = ()=>{
        animateTabRemoval(id,()=>{
          const idx = tabs.findIndex(x=>x.id === id);
          if(idx === -1)return;
          if(editors[id]){
            const ed = editors[id];
            if(ed.cm && typeof ed.cm.toTextArea === 'function'){
              try { ed.cm.toTextArea(); }catch { /* ignore */ }
            }
            delete editors[id];
          }
          tabs.splice(idx,1);
          if(activeId === id){
            if(tabs[idx]) activeId = tabs[idx].id;
            else if(tabs[idx - 1]) activeId = tabs[idx - 1].id;
            else activeId = null;
          }
          ensureAtLeastOne();
          save();
          renderTabs();
          if(activeId) selectTab(activeId);
        });
      };
      const liveContent = (t && activeId === id && t.mode !== 'notepad') ? getEditorContent() : (t ? t.content || '' : '');
      const hasMeaningfulContent = t && t.mode==='rich'
        ? isMeaningfulRichContent(liveContent)
        : !!((liveContent || '').trim());
      if(!hasMeaningfulContent && !hasMeaningfulNotepadContent(t)){
        executeClose();
      }else {
        confirmAction('Close Tab',`Are you sure you want to close "${title}"? Any unsaved changes will be lost permanently.`,executeClose,targetEl);
      }
    }

    function saveCurrentEditor(){
      const t=tabs.find(x=>x.id===activeId);
      if(!t)return;
      if(t.mode==='notepad') t.content = '';
      else t.content = getEditorContent();
      // save cursor/selection
      if(t.mode==='text'){
        const ed=editors[t.id]; if(ed && ed.cm && typeof ed.cm.getCursor==='function'){t.cursor=ed.cm.getCursor();}
      }else if(t.mode==='rich'){
        const ed=editors[t.id];
        if(ed && ed.quill && typeof ed.quill.getSelection==='function'){
          const selection = ed.quill.getSelection();
          if(selection)t.cursor={index:selection.index,length:selection.length||0};
        }
      }else if(t.mode==='notepad'){
        // store index and cursor position inside note
        const focused = document.querySelector('#notesContainer textarea:focus');
        if(focused){t.cursor={noteId:focused.dataset.noteId,start:focused.selectionStart,end:focused.selectionEnd};}
      }
      if(t.mode==='text') t.language = document.getElementById('languageSelect').value;
      save();
    }

    function buildPreviewSignature(tab,lang){
      const support = canUseSecureIframePreview() ? 'secure' : 'insecure';
      const mdReady = md ? 'md1' : 'md0';
      const jsonReady = window.JSONFormatter ? 'json1' : 'json0';
      return [tab.mode,lang,support,mdReady,jsonReady,tab.content || ''].join('|');
    }

    function updatePreview(force=false){
      if(previewDebounceTimer){
        clearTimeout(previewDebounceTimer);
        previewDebounceTimer = null;
      }
      const t=tabs.find(x=>x.id===activeId);
      const pv=document.getElementById('previewContent');
      if(!t||!pv)return;
      if(!force){
        const panel = document.getElementById('preview');
        if(panel && panel.classList.contains('hidden')) return;
      }
      let lang = t.language;
      if(lang==='detect') lang=detectLanguageFromTitle(t.title);
      if(t.mode==='text' && lang==='markdown') initMarkdownIt();
      const signature = buildPreviewSignature(t,lang);
      if(!force && lastPreviewTabId === t.id && t.lastPreviewSignature === signature) return;
      t.lastPreviewSignature = signature;
      lastPreviewTabId = t.id;
      if(t.mode==='text'){
        if(lang==='markdown'){
          if(md){
            if(!canUseSecureIframePreview()){
              renderPreviewError('Secure preview unavailable',SECURE_PREVIEW_UNAVAILABLE_MESSAGE);
            }else {
              const html=md.render(t.content||'');
              swapPreviewIframe(pv,html);
            }
          }else {pv.textContent=t.content}
        }else if(lang==='htmlmixed'){
          if(!canUseSecureIframePreview()){
            renderPreviewError('Secure preview unavailable',SECURE_PREVIEW_UNAVAILABLE_MESSAGE);
          }else {
            swapPreviewIframe(pv,t.content||'');
          }
        }else if(lang==='json'){
          const raw=t.content||'';
          try {
            pv.innerHTML='';
            const parsed=JSON.parse(raw||'{}');
            if(window.JSONFormatter){
              const formatter=new window.JSONFormatter(parsed,1);
              pv.appendChild(formatter.render());
            }else {
              pv.textContent=raw;
            }
          }catch (e){
            pv.innerHTML='';
            const err=document.createElement('div');
            err.style.color='#b91c1c';
            err.style.marginBottom='8px';
            err.textContent='Invalid JSON: '+(e && e.message ? e.message : 'parse error');
            const pre=document.createElement('pre');
            pre.style.whiteSpace='pre-wrap';
            pre.style.wordBreak='break-word';
            pre.textContent=raw;
            pv.appendChild(err);
            pv.appendChild(pre);
          }
        }else {
          pv.textContent=t.content
        }
      }else {
        pv.textContent=t.content
      }
    }

    // notepad helpers
    function renderNotepad(){
      const t=tabs.find(x=>x.id===activeId);
      const container=document.getElementById('notesContainer');
      container.innerHTML='';
      if(!t.notepadData) t.notepadData=[];
      t.notepadData.forEach(note=>{
        const card=document.createElement('div');
        card.className = 'note-card';
        
        // Title Section
        const header=document.createElement('div');
        header.className = 'note-header';
        
        const titleInput=document.createElement('input');
        titleInput.type = 'text';
        titleInput.className = 'flex-1 border-none p-0 focus:ring-0 text-sm font-bold text-slate-900 bg-transparent placeholder-slate-400 outline-none';
        titleInput.placeholder = 'Note Title';
        titleInput.value = note.title || '';
        titleInput.dataset.noteId = note.id;
        titleInput.addEventListener('input',()=>{
          note.title=titleInput.value;
          save();
        });

        const del=document.createElement('button');
        del.innerHTML=`<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>`;
        del.title='Delete note';
        del.className='note-delete text-slate-400 hover:text-rose-500 transition-colors p-1';
        del.onclick=(e)=>{removeNote(note.id,e.currentTarget)};
        
        header.appendChild(titleInput);

        // Body Section
        const body = document.createElement('div');
        body.className = 'note-body';

        const ta=document.createElement('textarea');
        ta.className = 'note-textarea';
        ta.placeholder = 'Start typing...';
        ta.dataset.noteId=note.id;
        ta.value=note.text;
        ta.rows = 1;
        const autoResize = (el)=>{
          el.style.height = 'auto';
          el.style.height = (el.scrollHeight) + 'px';
        };
        ta.addEventListener('input',()=>{
          note.text=ta.value;
          autoResize(ta);
          save();
        });
        
        body.appendChild(ta);
        card.appendChild(header);
        card.appendChild(body);
        card.appendChild(del);
        container.appendChild(card);
        setTimeout(()=>autoResize(ta),0);
        if(note._new){
          delete note._new;
          setTimeout(()=>titleInput.focus(),10);
        }
      });
    }
    function addNote(){
      saveCurrentEditor();
      const t=tabs.find(x=>x.id===activeId);
      if(!t.notepadData) t.notepadData=[];
      const id=uid();
      t.notepadData.push({id,title:'',text:'',_new:true}); // add to end
      save();
      renderNotepad();
    }
    function removeNote(id,targetEl = null){
      const t=tabs.find(x=>x.id===activeId);
      if(!t || !t.notepadData)return;
      const executeRemove = ()=>{
        t.notepadData=t.notepadData.filter(n=>n.id!==id);
        save();
        renderNotepad();
      };
      const note = t.notepadData.find(n=>n.id===id);
      if(!note || (!note.title.trim() && !note.text.trim())){
        executeRemove();
      }else {
        confirmAction('Delete Note','Are you sure you want to delete this note? This action cannot be undone.',executeRemove,targetEl);
      }
    }

    function getEditorContent(){
      const t=tabs.find(x=>x.id===activeId);
      if(!t)return'';
      const ed = editors[t.id] || {};
      if(t.mode==='text' && ed.cm)return ed.cm.getValue();
      if(t.mode==='rich' && ed.quill)return(ed.quill.root && ed.quill.root.innerHTML) || '';
      if(t.mode==='notepad')return'';
      return'';
    }

    function setEditorContent(content){
      const t=tabs.find(x=>x.id===activeId);
      if(!t)return;
      const ed = editors[t.id] = editors[t.id] || {};
      if(t.mode==='text'){
        if(!ed.cm) initCodeMirror(t.id);
        if(ed.cm) ed.cm.setValue(content||'');
      }
      if(t.mode==='rich'){
        if(!ed.quill) initQuill(t.id);
        if(ed.quill) ed.quill.root.innerHTML=content||'';
      }
      if(t.mode==='notepad'){
        if(!t.notepadData) t.notepadData = [];
        renderNotepad();
      }
    }

    function initCodeMirror(tabId){
      const ed = editors[tabId] = editors[tabId] || {};
      if(ed.cm && typeof ed.cm.toTextArea === 'function') ed.cm.toTextArea();
      const t = tabs.find(x=>x.id===tabId);
      if(!t)return;
      let lang = t.language || 'detect';
      if(lang==='detect') lang=detectLanguageFromTitle(t.title);
      if(lang==='java') lang='text/x-java';
      const textEditorEl = document.getElementById('textEditor');
      textEditorEl.innerHTML='';
      // headless environment (tests) may set a flag to avoid CodeMirror's heavy logic
      if(window.__TEXTGERBIL_HEADLESS){
        let headlessCursor = t.cursor && typeof t.cursor.line==='number' && typeof t.cursor.ch==='number'
          ? {line:t.cursor.line,ch:t.cursor.ch}
          : {line:0,ch:0};
        ed.cm = {
          getValue:()=>t.content||'',
          setValue:(v)=>{t.content=v;},
          on:()=>{},
          setOption:()=>{},
          focus:()=>{window.__TEXTGERBIL_HEADLESS_LAST_FOCUS={tabId,mode:'text'};},
          toTextArea:()=>{},
          getWrapperElement:()=>({style:{}}),
          getCursor:()=>({line:headlessCursor.line,ch:headlessCursor.ch}),
          setCursor:(c)=>{
            if(c && typeof c.line==='number' && typeof c.ch==='number'){
              headlessCursor={line:c.line,ch:c.ch};
            }
          }
        };
        return;
      }
      ed.cm = CodeMirror(textEditorEl,{
        value: t.content||'',
        mode: lang,
        theme: 'monokai',
        lineNumbers: true,
        tabSize: 2,
        indentUnit: 2
      });
      // guard against environments (like JSDOM) where getBoundingClientRect may be missing
      if(ed.cm && ed.cm.display && ed.cm.display.wrapper){
        const wrap = ed.cm.display.wrapper;
        if(typeof wrap.getBoundingClientRect !== 'function'){
          wrap.getBoundingClientRect = ()=>({left:0,top:0,right:0,bottom:0,width:0,height:0});
        }
      }
      ed.cm.on('change',()=>{
        const tab=tabs.find(x=>x.id===tabId);
        if(tab){tab.content=ed.cm.getValue(); save(); schedulePreviewUpdate()}
      });
    }

    function initQuill(tabId){
      const ed = editors[tabId] = editors[tabId] || {};
      const t = tabs.find(x=>x.id===tabId);
      const richEditorEl = document.getElementById('richEditor');
      richEditorEl.innerHTML='<div id="quill-root"></div>';
      if(window.__TEXTGERBIL_HEADLESS){
        // simple stub with minimal interface
        let headlessSelection = t.cursor && Number.isFinite(t.cursor.index)
          ? {index:t.cursor.index,length:Number.isFinite(t.cursor.length)?t.cursor.length:0}
          : {index:0,length:0};
        ed.quill = {
          root:{innerHTML: t.content||'',style:{}},
          on:()=>{},
          focus:()=>{window.__TEXTGERBIL_HEADLESS_LAST_FOCUS={tabId,mode:'rich'};},
          getSelection:()=>({index:headlessSelection.index,length:headlessSelection.length}),
          setSelection:(index,length=0)=>{
            headlessSelection = {
              index:Number.isFinite(index)?index:0,
              length:Number.isFinite(length)?length:0
            };
          }
        };
        return;
      }
      if(!window.__TEXTGERBIL_QUILL_FONT_SET){
        const Font = Quill.import('formats/font');
        Font.whitelist = [
          'arial','comic-sans-ms','courier-new','garamond','georgia',
          'helvetica','lucida-console','palatino','tahoma','times',
          'times-new-roman','trebuchet-ms','verdana'
        ];
        Quill.register(Font,true);
        window.__TEXTGERBIL_QUILL_FONT_SET = true;
      }
      ed.quill = new Quill('#quill-root',{
        theme: 'snow',
        placeholder: 'Start typing...',
        modules: {toolbar: [
          [{font:[
            'arial','comic-sans-ms','courier-new','garamond','georgia',
            'helvetica','lucida-console','palatino','tahoma','times',
            'times-new-roman','trebuchet-ms','verdana'
          ]},{size:['small',false,'large','huge']}],
          [{header:[1,2,3,4,5,6,false]}],
          ['bold','italic','underline','strike','code'],
          [{color:[]},{background:[]}],
          ['blockquote','code-block'],
          [{list:'ordered'},{list:'bullet'},{list:'check'}],
          ['clean']
        ]},
        formats: [
          'header','font','size',
          'bold','italic','underline','strike','code',
          'color','background',
          'blockquote','code-block',
          'list'
        ]
      });
      if(t && t.content) ed.quill.root.innerHTML=t.content;
      ed.quill.on('text-change',()=>{
        if(t){t.content=(ed.quill.root && ed.quill.root.innerHTML) || ''; save(); schedulePreviewUpdate()}
      });
    }

    function applyPreviewVisibility(tab){
      const preview = document.getElementById('preview');
      const handle = document.getElementById('previewResizeHandle');
      if(!preview || !handle)return;
      const canPreview = canTabPreview(tab);
      const shouldShow = !!canPreview && !!tab.previewVisible;
      if(tab) applyPreviewWidth(tab);
      preview.classList.toggle('hidden',!shouldShow);
      handle.classList.toggle('hidden',!shouldShow);
    }

    function initPreviewResize(){
      const handle = document.getElementById('previewResizeHandle');
      const main = document.querySelector('main');
      if(!handle || !main)return;
      let dragging = false;
      let pointerId = null;

      const stopDragging = ()=>{
        dragging = false;
        pointerId = null;
      };

      handle.addEventListener('pointerdown',(ev)=>{
        if(ev.button !== 0)return;
        const t=tabs.find(x=>x.id===activeId);
        const preview=document.getElementById('preview');
        if(!t || !canTabPreview(t) || !preview || preview.classList.contains('hidden'))return;
        dragging = true;
        pointerId = ev.pointerId;
        if(typeof handle.setPointerCapture==='function'){
          try {handle.setPointerCapture(pointerId);}catch {/* ignore capture errors */}
        }
        ev.preventDefault();
      });

      handle.addEventListener('pointermove',(ev)=>{
        if(!dragging || (pointerId!==null && ev.pointerId!==pointerId))return;
        const t=tabs.find(x=>x.id===activeId);
        if(!t || !canTabPreview(t))return;
        const mainRect = main.getBoundingClientRect();
        const desiredWidth = mainRect.right - ev.clientX;
        t.previewWidth = clampPreviewWidthForTab(t,desiredWidth);
        applyPreviewWidth(t);
        save();
      });

      handle.addEventListener('pointerup',stopDragging);
      handle.addEventListener('pointercancel',stopDragging);
    }

    function canTabPreview(tab){
      if(!tab || tab.mode!=='text')return false;
      let lang = tab.language;
      if(lang==='detect') lang=detectLanguageFromTitle(tab.title);
      if(lang==='markdown' || lang==='htmlmixed')return canUseSecureIframePreview();
      if(lang==='json')return!!window.JSONFormatter;
      return false;
    }

    function switchEditorMode(mode,tabId){
      const els = document.querySelectorAll('.editor-instance');
      els.forEach(e=>e.classList.remove('active'));
      const t = tabs.find(x=>x.id===tabId);
      applyPreviewVisibility(t);
      syncPreviewToggleState();
      const langSelect = document.getElementById('languageSelect');
      if(langSelect){
        langSelect.style.display = 'inline-block';
        langSelect.disabled = mode !== 'text';
      }
      if(mode==='text'){
        document.getElementById('textEditor').classList.add('active');
        initCodeMirror(tabId);
      }else if(mode==='rich'){
        document.getElementById('richEditor').classList.add('active');
        // Rich tabs share one DOM mount point, so rebind Quill per activation.
        initQuill(tabId);
      }else if(mode==='notepad'){
        document.getElementById('notepadEditor').classList.add('active');
      }
    }

    function applyThemeToEditor(theme){
      if(!theme)return;
      // determine which element is currently visible for styling
      const t = tabs.find(x=>x.id===activeId);
      if(!t)return;
      let target = null;
      if(t.mode==='text'){
        const ed = editors[t.id];
        if(ed && ed.cm && typeof ed.cm.getWrapperElement==='function') target = ed.cm.getWrapperElement();
        else target = document.getElementById('textEditor');
      }else if(t.mode==='rich'){
        const ed = editors[t.id];
        if(ed && ed.quill) target = ed.quill.root;
      }else if(t.mode==='notepad'){
        // notepad theme applies to notes container
        target = document.getElementById('notesContainer');
      }
      if(!target)return;
      if(theme.fontFamily) target.style.fontFamily=theme.fontFamily;
      if(theme.fontSize) target.style.fontSize=theme.fontSize+'px';
      if(theme.bg) target.style.background=theme.bg;
      if(theme.fg) target.style.color=theme.fg;
    }

    // helpers
    function populateThemeInputs(){
      const t=tabs.find(x=>x.id===activeId);
      const theme = t && t.theme ? t.theme : globalTheme || {};
      document.getElementById('fontFamily').value=theme.fontFamily||'';
      document.getElementById('fontSize').value=theme.fontSize||14;
      document.getElementById('bgColor').value=theme.bg||'#ffffff';
      document.getElementById('fgColor').value=theme.fg||'#111111';
    }

    function syncPreviewToggleState(){
      const preview=document.getElementById('preview');
      const btn=document.getElementById('togglePreview');
      if(!preview||!btn)return;
      const t=tabs.find(x=>x.id===activeId);
      const canPreview=canTabPreview(t);
      btn.disabled=!canPreview;
      let lang = t?t.language:'plain';
      if(lang==='detect') lang=detectLanguageFromTitle(t.title);
      const isHtmlOrMarkdown=!!(t && t.mode==='text' && (lang==='markdown' || lang==='htmlmixed'));
      const jsonReady=!!window.JSONFormatter;
      const secureReady=canUseSecureIframePreview();
      if(canPreview){
        btn.title='Toggle preview';
      }else if(isHtmlOrMarkdown && !secureReady){
        btn.title='Preview disabled: browser lacks secure iframe support (sandbox + srcdoc)';
      }else {
        btn.title=jsonReady?'Preview available only for Markdown/HTML/JSON':'Preview available only for Markdown/HTML (JSON formatter unavailable)';
      }
      const isVisible=!preview.classList.contains('hidden');
      btn.classList.toggle('is-active',isVisible);
      btn.setAttribute('aria-pressed',String(isVisible));
    }

    // UI wiring
    renderAddTabIcons();
    document.getElementById('tabTitle').ondblclick=()=>enableTabRename(document.getElementById('tabTitle'),activeId,true);
    const addTabSplit = document.getElementById('addTabSplit');
    const addTabMenu = document.getElementById('addTabMenu');
    function closeAddTabMenu(){
      if(addTabMenu) addTabMenu.classList.add('hidden');
    }
    document.getElementById('addTabDefault').onclick=()=>{newTab('text')}
    document.getElementById('addTabToggle').onclick=(ev)=>{
      ev.stopPropagation();
      if(addTabMenu) addTabMenu.classList.toggle('hidden');
    }
    document.querySelectorAll('#addTabMenu .add-tab-option').forEach(btn=>{
      btn.addEventListener('click',(ev)=>{
        ev.stopPropagation();
        newTab(btn.dataset.mode || 'text');
        closeAddTabMenu();
      });
    });
    document.getElementById('addNoteBtn').addEventListener('click',()=>{addNote()});
    document.getElementById('languageSelect').addEventListener('change',e=>{
      const t=tabs.find(x=>x.id===activeId);
      if(t && t.mode==='text'){
        t.language=e.target.value;
        if(!canTabPreview(t)){
          t.previewVisible=false;
        }
        if(editors[t.id] && editors[t.id].cm){
          let realLang = t.language;
          if(realLang==='detect') realLang=detectLanguageFromTitle(t.title);
          editors[t.id].cm.setOption('mode',realLang);
        }
        save();
        updatePreview();
        applyPreviewVisibility(t);
        syncPreviewToggleState();
      }
    })
    document.getElementById('togglePreview').onclick=()=>{
      const t=tabs.find(x=>x.id===activeId);
      if(!canTabPreview(t))return;
      t.previewVisible = !t.previewVisible;
      applyPreviewVisibility(t);
      if(t.previewVisible) updatePreview(true);
      save();
      syncPreviewToggleState();
    }
    document.getElementById('emojiBtn').onmousedown=(ev)=>{
      ev.preventDefault();
      const target = findPreferredEmojiTarget();
      if(isEditableTarget(target)) lastEmojiTarget = target;
    }
    document.getElementById('emojiBtn').onclick=(ev)=>{
      ev.stopPropagation();
      const picker=document.getElementById('emojiPicker');
      if(emojiPickerOpen){
        closeEmojiPicker();
      }else {
        openEmojiPicker(ev.currentTarget);
        if(picker){
          const target = findPreferredEmojiTarget();
          if(target && typeof target.focus==='function') target.focus();
        }
      }
    }
    document.getElementById('exportBtn').onclick=()=>exportCurrent();
    document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
    document.getElementById('importFile').addEventListener('change',handleImport);
    document.getElementById('themeBtn').onclick=()=>{
      const p=document.getElementById('settingsPanel');
      if(p.style.display==='none') populateThemeInputs();
      p.style.display=p.style.display==='none'?'block':'none';
    }
    document.getElementById('applyTheme').onclick=()=>{
      const t=tabs.find(x=>x.id===activeId);if(!t)return;
      t.theme={fontFamily:document.getElementById('fontFamily').value,fontSize:document.getElementById('fontSize').value,bg:document.getElementById('bgColor').value,fg:document.getElementById('fgColor').value};
      applyThemeToEditor(t.theme);save();
    }
    document.getElementById('applyGlobal').onclick=()=>{
      const theme={fontFamily:document.getElementById('fontFamily').value,fontSize:document.getElementById('fontSize').value,bg:document.getElementById('bgColor').value,fg:document.getElementById('fgColor').value};
      tabs.forEach(t=>t.theme=Object.assign({},theme));
      globalTheme=Object.assign({},theme);
      applyThemeToEditor(tabs.find(x=>x.id===activeId).theme);
      save();
    }
    document.addEventListener('click',(ev)=>{
      if(!emojiPickerOpen)return;
      const picker=document.getElementById('emojiPicker');
      const btn=document.getElementById('emojiBtn');
      if((picker && picker.contains(ev.target)) || (btn && btn.contains(ev.target)))return;
      closeEmojiPicker();
    });
    document.addEventListener('click',(ev)=>{
      if(!addTabMenu || addTabMenu.classList.contains('hidden'))return;
      if(addTabSplit && addTabSplit.contains(ev.target))return;
      closeAddTabMenu();
    });
    document.addEventListener('focusin',(ev)=>{
      if(isEditableTarget(ev.target)) lastEmojiTarget = ev.target;
    });
    document.addEventListener('keydown',(ev)=>{
      if(ev.key==='Escape' && emojiPickerOpen){
        closeEmojiPicker();
      }
    });
    window.addEventListener('resize',()=>{
      if(!emojiPickerOpen)return;
      const btn=document.getElementById('emojiBtn');
      if(btn) openEmojiPicker(btn);
    });

    // Initialization
    if(!load()){tabs=[];}
    if(!Array.isArray(tabs)) tabs=[];
    tabs=tabs.map(normalizeLoadedTab).filter(Boolean);
    if(globalTheme){
      tabs.forEach(t=>{
        if(!t.theme || Object.keys(t.theme).length===0){
          t.theme=Object.assign({},globalTheme);
        }
      });
    }
    ensureAtLeastOne();
    if(!tabs.find(x=>x.id===activeId)) activeId=tabs[0].id;
    initMarkdownIt();
    initPreviewResize();
    renderTabs();
    selectTab(activeId);
    syncPreviewToggleState();

    // import/export helpers
    function exportCurrent(){
      const t=tabs.find(x=>x.id===activeId);
      if(!t)return;
      const blob=new Blob([t.content||''],{type:'text/plain'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=(t.title||'untitled')+'.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    }
    function handleImport(e){
      const file=e.target.files[0];
      if(!file)return;
      const reader=new FileReader();
      reader.onload=()=>{
        const text=reader.result;
        // open in new tab
        const newId=uid();
        const t={id:newId,title:file.name,mode:'text',language:'detect',content:text,theme:{},previewVisible:false,previewWidth:DEFAULT_PREVIEW_WIDTH};
        if(globalTheme) t.theme=Object.assign({},globalTheme);
        tabs.push(t);
        activeId=newId;
        renderTabs();
        selectTab(activeId);
        save();
      };
      reader.readAsText(file);
      e.target.value='';
    }
    // keyboard shortcuts
    document.addEventListener('keydown',ev=>{
      const cmd = ev.metaKey||ev.ctrlKey;
      if(!cmd)return;
      switch(ev.key.toLowerCase()){
        case 's': ev.preventDefault(); exportCurrent(); break;
        case 'o': ev.preventDefault(); document.getElementById('importBtn').click(); break;
        case 't': ev.preventDefault(); newTab('text'); break;
        case 'w': ev.preventDefault(); closeTab(activeId); break;
      }
    });

    // expose for debugging
    window.__textgerbil = {
      get tabs(){return tabs},
      get activeId(){return activeId},
      get globalTheme(){return globalTheme},
      save,
      load,
      newTab,
      closeTab,
      selectTab,
      editors,
      initCodeMirror,
      initQuill,
      exportCurrent,
      detectLanguageFromTitle,
      renderTabs,
      updatePreview,
      syncPreviewToggleState,
      getPreviewSupport,
      canUseSecureIframePreview,
      setPreviewSupportOverride:(override)=>{previewSupportOverride=override||null; syncPreviewToggleState(); updatePreview();},
      setMarkdownRendererForTest:(renderer)=>{md=renderer||null; updatePreview();},
      getActiveTabPreviewWidth:()=>{
        const t=tabs.find(x=>x.id===activeId);
        return t ? t.previewWidth : null;
      },
      setActiveTabPreviewWidth:(width)=>{
        const t=tabs.find(x=>x.id===activeId);
        if(!t)return;
        t.previewWidth = clampPreviewWidthForTab(t,width);
        applyPreviewWidth(t);
        save();
      }
    }
  </script>
</body>
</html>
