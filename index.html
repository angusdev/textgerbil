<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TextGerbil — Single File Editor</title>
  <!-- CodeMirror CSS & JS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
  <!-- Quill Rich Text Editor CSS & JS -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <!-- markdown-it for Markdown preview -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@13/dist/markdown-it.min.js"></script>
  <!-- json-formatter-js for JSON tree preview -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/json-formatter-js@2.5.23/dist/json-formatter.css">
  <script src="https://cdn.jsdelivr.net/npm/json-formatter-js@2.5.23/dist/json-formatter.umd.js"></script>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if(window.tailwind){
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                500: '#2b8be6',
                600: '#1f74c6'
              }
            }
          }
        }
      };
    }
  </script>
  <style>
    :root{--accent:#2b8be6}
    html,body{height:100%;margin:0}
    textarea{flex:1;width:100%;height:100%;resize:none;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;border:1px solid #e2e8f0;border-radius:8px;background:white;color:inherit}
    .editor-instance{flex:1;width:100%;height:100%;display:none}
    .editor-instance.active{display:flex}
    .CodeMirror{flex:1;width:100%;height:100%;font-size:14px}
    .ql-container{flex:1;width:100%;height:100%;overflow:auto}
    .ql-editor{min-height:100%;padding:12px}
    .hidden{display:none}
    .settings label{font-size:13px}
    .btn{background:var(--accent);color:#fff;padding:6px 10px;border-radius:8px;border:none;cursor:pointer}
    .small{padding:6px 10px;font-size:13px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:#0f172a;cursor:pointer;display:inline-flex;align-items:center;gap:6px;line-height:1}
    .small:hover{background:#f8fafc}
    .small.is-active{background:var(--accent);border-color:var(--accent);color:#fff}
    .small:disabled{opacity:.45;color:#64748b;background:#f1f5f9;border-color:#e2e8f0;cursor:not-allowed;filter:saturate(.35)}
    .small:disabled:hover{background:#f1f5f9}
    .icon{width:14px;height:14px;display:inline-block}
    #previewResizeHandle{width:12px;cursor:col-resize;position:relative;touch-action:none}
    #previewResizeHandle::before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:2px;border-radius:2px;background:#cbd5e1}
    #previewResizeHandle:hover::before{background:#2b8be6}
  </style>
</head>
<body class="h-screen bg-slate-100 text-slate-900">
  <div class="app h-full flex flex-col bg-gradient-to-br from-slate-100 via-slate-50 to-sky-100">
    <header class="border-b border-slate-200 bg-white/90 px-3 py-2 backdrop-blur">
      <div class="flex items-center gap-3">
      <img src="images/textgerbil.png" alt="TextGerbil" class="h-16" />
      <div class="tabs flex min-w-0 flex-1 items-center gap-2 overflow-hidden py-1" id="tabs"></div>
        <button id="addTab" class="btn small" aria-label="New tab" title="New">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
    </header>

    <main class="flex h-full min-h-0 flex-1 overflow-auto p-3">
      <section class="editor-area flex h-full min-w-0 flex-1 flex-col gap-2 rounded-xl border border-slate-200 bg-white p-3 shadow-sm">
        <div class="flex flex-wrap items-center gap-2">
          <div id="tabTitle" class="font-semibold text-slate-800"></div>
          <div class="toolbar ml-auto flex flex-wrap items-center gap-2">
          <select id="modeSelect" class="h-[30px] rounded-lg border border-slate-300 bg-white px-2 text-sm text-slate-800" title="Mode" aria-label="Select editor mode">
            <option value="text">Text</option>
            <option value="rich">Rich Text</option>
            <option value="notepad">Notepad</option>
          </select>
          <select id="languageSelect" class="h-[30px] rounded-lg border border-slate-300 bg-white px-2 text-sm text-slate-800" title="Language" aria-label="Select language for syntax highlighting" style="display:none;">
            <option value="plain">Plain</option>
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="markdown">Markdown</option>
            <option value="htmlmixed">HTML</option>
            <option value="css">CSS</option>
            <option value="json">JSON</option>
            <option value="sql">SQL</option>
          </select>
          <button id="togglePreview" class="small" aria-label="Toggle preview" title="Preview">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button id="exportBtn" class="small" aria-label="Export file" title="Export">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
          </button>
          <button id="importBtn" class="small" aria-label="Import file" title="Import">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 21V9"/><path d="m17 14-5-5-5 5"/><path d="M5 3h14"/></svg>
          </button>
          </div>
          <div class="text-sm text-slate-600"><button id="themeBtn" class="small" aria-label="Settings" title="Settings"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.2a1.7 1.7 0 0 0 1 1.5h.1a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.2a1.7 1.7 0 0 0-1.5 1z"/></svg></button></div>
          <input type="file" id="importFile" class="hidden" accept="*/*" aria-hidden="true" />
        </div>
        <div class="editor flex min-h-0 min-w-0 flex-1 overflow-hidden rounded-lg border border-slate-200 bg-white">
          <div id="textEditor" class="editor-instance active"></div>
          <div id="richEditor" class="editor-instance"></div>
          <div id="notepadEditor" class="editor-instance flex-col gap-2 overflow-auto p-2">
            <button id="addNoteBtn" class="small btn" style="align-self:flex-start">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
              <span>Note</span>
            </button>
            <div id="notesContainer" class="flex flex-col gap-2"></div>
          </div>
        </div>
        <div class="settings grid grid-cols-1 gap-2 border-t border-slate-200 pt-2 md:grid-cols-2" id="settingsPanel" style="display:none">
          <label class="text-sm text-slate-700">Font family: <input class="mt-1 w-full rounded-lg border border-slate-300 px-2 py-1 text-sm" id="fontFamily" placeholder="e.g. Inter, monospace"/></label>
          <label class="text-sm text-slate-700">Font size: <input class="mt-1 w-full rounded-lg border border-slate-300 px-2 py-1 text-sm" id="fontSize" type="number" min="10" max="48" value="14"/></label>
          <label class="text-sm text-slate-700">Background: <input class="mt-1 h-9 w-full rounded-lg border border-slate-300 px-1" id="bgColor" type="color" value="#ffffff"/></label>
          <label class="text-sm text-slate-700">Foreground: <input class="mt-1 h-9 w-full rounded-lg border border-slate-300 px-1" id="fgColor" type="color" value="#111111"/></label>
          <div style="margin-top:8px"><button id="applyTheme" class="btn small"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg><span>Apply to current</span></button> <button id="applyGlobal" class="small"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg><span>Apply to all</span></button></div>
        </div>
      </section>

      <div id="previewResizeHandle" class="hidden ml-2 mr-1 shrink-0 rounded" role="separator" aria-orientation="vertical" aria-label="Resize preview pane"></div>
      <aside class="sidebar hidden h-full min-h-0 self-stretch flex w-[360px] shrink-0 flex-col gap-2 overflow-auto rounded-xl border border-slate-200 bg-white p-3 shadow-sm" id="preview">
        <div class="font-bold text-slate-800">Preview</div>
        <div id="previewContent" class="flex min-h-0 flex-1 overflow-auto pt-1 text-slate-700"></div>
      </aside>
    </main>
  </div>

  <script>
    const STORAGE_KEY = 'textgerbil_v1_tabs'
    const STORAGE_GLOBAL = 'textgerbil_v1_global'
    let tabs = []
    let activeId = null
    let globalTheme = null
    let editors = {} // store editor instances: {tabId: {cm, quill, ...}}
    let md = null // markdown-it instance
    let previewSupportOverride = null
    const DEFAULT_PREVIEW_WIDTH = 360
    const MIN_PREVIEW_WIDTH = 260
    const MIN_EDITOR_WIDTH = 320
    const SECURE_PREVIEW_UNAVAILABLE_MESSAGE = 'This browser does not support the required iframe security features (sandbox + srcdoc). HTML/Markdown preview is disabled to protect your data.'
    // data for notepad: each tab will have notepadData = [{id,text},...]
    // cursor state: stored per-tab under .cursor


    function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

    function initMarkdownIt(){
      if(!md && window.markdownit) md = window.markdownit('commonmark',{html: false,breaks: true})
      return md
    }

    function getPreviewSupport(){
      if(previewSupportOverride)return previewSupportOverride
      const supportsIframe = typeof HTMLIFrameElement !== 'undefined'
      const iframe = document.createElement('iframe')
      const supportsSrcdoc = 'srcdoc' in iframe
      const supportsSandbox = 'sandbox' in iframe
      return{supportsIframe,supportsSrcdoc,supportsSandbox}
    }

    function canUseSecureIframePreview(){
      const support = getPreviewSupport()
      return support.supportsIframe && support.supportsSrcdoc && support.supportsSandbox
    }

    function renderPreviewError(message,details){
      const pv=document.getElementById('previewContent');
      if(!pv)return;
      pv.textContent='';
      const box=document.createElement('div');
      box.className='rounded-lg border border-amber-300 bg-amber-50 p-3 text-amber-900';
      const title=document.createElement('div');
      title.className='mb-1 font-semibold';
      title.textContent=message;
      box.appendChild(title);
      const body=document.createElement('div');
      body.className='text-sm';
      body.textContent=details;
      box.appendChild(body);
      pv.appendChild(box);
    }

    function buildSandboxedPreviewIframe(htmlBody){
      const iframe=document.createElement('iframe');
      iframe.style.width='100%';
      iframe.style.height='100%';
      iframe.style.border='0';
      iframe.setAttribute('scrolling','yes');
      iframe.setAttribute('sandbox','');
      iframe.referrerPolicy='no-referrer';
      iframe.srcdoc='<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="Content-Security-Policy" content="default-src \'none\'; img-src data:; style-src \'unsafe-inline\'; font-src data:; connect-src \'none\'; media-src \'none\'; object-src \'none\'; base-uri \'none\'; form-action \'none\'; frame-ancestors \'none\'"><style>html,body{margin:0;padding:10px;color:#0f172a;background:#fff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;line-height:1.5}pre{white-space:pre-wrap;word-break:break-word}</style></head><body>'+htmlBody+'</body></html>';
      return iframe;
    }

    function detectLanguageFromTitle(title){
      if(!title)return'plain';
      const ext = title.split('.').pop().toLowerCase();
      const map = {'js':'javascript','py':'python','md':'markdown','html':'htmlmixed','htm':'htmlmixed','css':'css','json':'json','sql':'sql','ts':'javascript','jsx':'javascript','tsx':'htmlmixed'};
      return map[ext] || 'plain';
    }

    function save(){
      localStorage.setItem(STORAGE_KEY,JSON.stringify({tabs,activeId}));
      if(globalTheme) localStorage.setItem(STORAGE_GLOBAL,JSON.stringify(globalTheme));
    }

    function clampPreviewWidthForTab(tab,width){
      const base = Number(width);
      const minClamped = Number.isFinite(base) ? Math.max(MIN_PREVIEW_WIDTH,Math.round(base)) : DEFAULT_PREVIEW_WIDTH;
      const main = document.querySelector('main');
      if(!main || !tab || tab.mode!=='text' || !canTabPreview(tab))return minClamped;
      const mainRect = main.getBoundingClientRect();
      const maxByEditor = Math.max(MIN_PREVIEW_WIDTH,Math.floor(mainRect.width - MIN_EDITOR_WIDTH - 8));
      return Math.min(minClamped,maxByEditor);
    }

    function applyPreviewWidth(tab){
      const preview = document.getElementById('preview');
      if(!preview || !tab)return;
      const width = clampPreviewWidthForTab(tab,tab.previewWidth);
      tab.previewWidth = width;
      preview.style.flex = '0 0 auto';
      preview.style.width = width+'px';
    }

    function load(){
      const v=localStorage.getItem(STORAGE_KEY);
      if(v){
        try {const s=JSON.parse(v);tabs=s.tabs||[];activeId=s.activeId;}catch {/*ignore*/}
      }
      const g=localStorage.getItem(STORAGE_GLOBAL);
      if(g){try {globalTheme=JSON.parse(g);}catch {globalTheme=null}}
      return true;
    }

    function renameTab(tabId,newTitle){
      const t=tabs.find(x=>x.id===tabId);
      if(!t)return;
      t.title=(newTitle||'').trim()||'Untitled';
      save();
      renderTabs();
      if(activeId===tabId) document.getElementById('tabTitle').textContent=t.title;
    }

    function enableTabRename(tabEl,tabId){
      const titleSpan=tabEl.querySelector('span:first-child');
      if(!titleSpan)return;
      const oldTitle=titleSpan.textContent;
      const input=document.createElement('input');
      input.type='text';
      input.value=oldTitle;
      input.style.cssText='padding:4px;border:1px solid var(--accent);border-radius:4px;width:100px;font-size:13px';
      titleSpan.replaceWith(input);
      input.focus();
      input.select();
      const confirmRename=()=>{
        const newTitle=input.value;
        renameTab(tabId,newTitle);
      };
      input.onkeypress=(e)=>{if(e.key==='Enter'){confirmRename();e.preventDefault();}};
      input.onblur=confirmRename;
    }

    function renderTabs(){const el=document.getElementById('tabs');el.innerHTML='';tabs.forEach(t=>{const d=document.createElement('div');const base='tab group inline-flex min-w-0 flex-initial cursor-pointer select-none items-center gap-2 rounded-lg border px-3 py-1.5 text-sm font-medium transition';const state=t.id===activeId?' border-brand-500 bg-sky-50 text-sky-700 shadow-sm':' border-slate-300 bg-white text-slate-700 hover:border-slate-400 hover:bg-slate-50';d.className=base+state;const titleSpan=document.createElement('span');titleSpan.className='min-w-0 truncate';titleSpan.textContent=t.title||'Untitled';titleSpan.ondblclick=(e)=>{e.stopPropagation();enableTabRename(d,t.id)};d.appendChild(titleSpan);const closeSpan=document.createElement('span');closeSpan.className='close shrink-0 text-slate-400 hover:text-rose-500';closeSpan.textContent='×';closeSpan.title='Close';
      closeSpan.onclick=(e)=>{e.stopPropagation();try {closeTab(t.id);}catch (err){console.error('closeTab error',err);}};
      d.appendChild(closeSpan);d.onclick=(e)=>{if(e.detail===1)selectTab(t.id)};el.appendChild(d)})}

    function ensureAtLeastOne(){if(tabs.length===0){tabs.push({id:uid(),title:'Untitled',mode:'text',language:'plain',content:'',theme:{},previewVisible:false,previewWidth:DEFAULT_PREVIEW_WIDTH});activeId=tabs[0].id}}

    function normalizeLoadedTab(rawTab){
      if(!rawTab || typeof rawTab!=='object')return null;
      const tab = Object.assign({},rawTab);
      tab.id = tab.id || uid();
      tab.title = (tab.title||'Untitled').toString();
      tab.mode = ['text','rich','notepad'].includes(tab.mode) ? tab.mode : 'text';
      tab.content = typeof tab.content==='string' ? tab.content : '';
      tab.theme = (tab.theme && typeof tab.theme==='object') ? tab.theme : {};
      if(tab.mode==='text'){
        tab.language = tab.language || detectLanguageFromTitle(tab.title) || 'plain';
      }else {
        tab.language = tab.language || 'plain';
      }
      if(typeof tab.previewVisible!=='boolean') tab.previewVisible=false;
      const parsedPreviewWidth = Number(tab.previewWidth);
      tab.previewWidth = Number.isFinite(parsedPreviewWidth) ? Math.max(MIN_PREVIEW_WIDTH,Math.round(parsedPreviewWidth)) : DEFAULT_PREVIEW_WIDTH;
      return tab;
    }

    function selectTab(id){
      const t=tabs.find(x=>x.id===id);
      if(!t)return;
      if(activeId && activeId!==id) saveCurrentEditor();
      activeId=id;
      document.getElementById('tabTitle').textContent=t.title;
      document.getElementById('modeSelect').value=t.mode;
      if(t.mode==='text'){
        if(!t.language) t.language = detectLanguageFromTitle(t.title);
        document.getElementById('languageSelect').value=t.language;
      }
      applyPreviewWidth(t);
      switchEditorMode(t.mode,id);
      setEditorContent(t.content||'');
      applyThemeToEditor(t.theme);
      renderTabs();
      updatePreview();
      save();
      // restore cursor and focus editor after rendering
      setTimeout(()=>restoreCursorAndFocus(t),50);
    }

    function restoreCursorAndFocus(tab){
      if(!tab)return;
      if(tab.mode==='text'){
        const ed=editors[tab.id];
        if(ed && ed.cm){
          if(tab.cursor && typeof ed.cm.setCursor==='function') ed.cm.setCursor(tab.cursor);
          if(typeof ed.cm.focus==='function') ed.cm.focus();
        }
        return;
      }
      if(tab.mode==='rich'){
        const ed=editors[tab.id];
        if(ed && ed.quill){
          if(typeof ed.quill.focus==='function') ed.quill.focus();
          else if(ed.quill.root && typeof ed.quill.root.focus==='function') ed.quill.root.focus();
        }
        return;
      }
      if(tab.mode==='notepad'){
        if(tab.cursor){
          const area=document.querySelector(`#notesContainer textarea[data-note-id="${tab.cursor.noteId}"]`);
          if(area){
            area.focus();
            area.setSelectionRange(tab.cursor.start||0,tab.cursor.end||0);
            return;
          }
        }
        const area=document.querySelector('#notesContainer textarea');
        if(area){
          area.focus();
          const end=area.value.length;
          area.setSelectionRange(end,end);
        }
      }
    }

    function newTab(mode='text'){
      saveCurrentEditor();
      const t={id:uid(),title:'Untitled',mode,language:'plain',content:'',theme:{},previewVisible:false,previewWidth:DEFAULT_PREVIEW_WIDTH};
      if(mode==='notepad') t.notepadData=[];
      if(globalTheme){t.theme=Object.assign({},globalTheme);} // inherit global
      tabs.push(t);
      activeId=t.id;
      renderTabs();
      selectTab(t.id);
      save();
    }

    function closeTab(id){
      const idx = tabs.findIndex(x=>x.id === id);
      if(idx === -1)return;
      // destroy any associated editor instance to prevent later errors
      if(editors[id]){
        const ed = editors[id];
        if(ed.cm && typeof ed.cm.toTextArea === 'function'){
          try { ed.cm.toTextArea(); }catch { /* ignore */ }
        }
        // quill doesn't provide a destroy API; clearing reference
        delete editors[id];
      }
      tabs.splice(idx,1);
      if(activeId === id){
        // pick next tab to the right, or previous one
        if(tabs[idx]) activeId = tabs[idx].id;
        else if(tabs[idx - 1]) activeId = tabs[idx - 1].id;
        else activeId = null;
      }
      ensureAtLeastOne();
      save();
      renderTabs();
      if(activeId) selectTab(activeId);
    }

    function saveCurrentEditor(){
      const t=tabs.find(x=>x.id===activeId);
      if(!t)return;
      t.content = getEditorContent();
      // save cursor/selection
      if(t.mode==='text'){
        const ed=editors[t.id]; if(ed && ed.cm && typeof ed.cm.getCursor==='function'){t.cursor=ed.cm.getCursor();}
      }else if(t.mode==='notepad'){
        // store index and cursor position inside note
        const focused = document.querySelector('#notesContainer textarea:focus');
        if(focused){t.cursor={noteId:focused.dataset.noteId,start:focused.selectionStart,end:focused.selectionEnd};}
      }
      t.mode = document.getElementById('modeSelect').value;
      if(t.mode==='text') t.language = document.getElementById('languageSelect').value;
      save();
    }

    function updatePreview(){
      const t=tabs.find(x=>x.id===activeId);
      const pv=document.getElementById('previewContent');
      if(!t||!pv)return;
      pv.innerHTML='';
      if(t.mode==='text'){
        if(t.language==='markdown'){
          initMarkdownIt();
          if(md){
            if(!canUseSecureIframePreview()){
              renderPreviewError('Secure preview unavailable',SECURE_PREVIEW_UNAVAILABLE_MESSAGE);
            }else {
              const html=md.render(t.content||'');
              pv.appendChild(buildSandboxedPreviewIframe(html));
            }
          }else {pv.textContent=t.content}
        }else if(t.language==='htmlmixed'){
          if(!canUseSecureIframePreview()){
            renderPreviewError('Secure preview unavailable',SECURE_PREVIEW_UNAVAILABLE_MESSAGE);
          }else {
            pv.appendChild(buildSandboxedPreviewIframe(t.content||''));
          }
        }else if(t.language==='json'){
          const raw=t.content||'';
          try {
            const parsed=JSON.parse(raw||'{}');
            if(window.JSONFormatter){
              const formatter=new window.JSONFormatter(parsed,1);
              pv.appendChild(formatter.render());
            }else {
              pv.textContent=raw;
            }
          }catch (e){
            const err=document.createElement('div');
            err.style.color='#b91c1c';
            err.style.marginBottom='8px';
            err.textContent='Invalid JSON: '+(e && e.message ? e.message : 'parse error');
            const pre=document.createElement('pre');
            pre.style.whiteSpace='pre-wrap';
            pre.style.wordBreak='break-word';
            pre.textContent=raw;
            pv.appendChild(err);
            pv.appendChild(pre);
          }
        }else {
          pv.textContent=t.content
        }
      }else {
        pv.textContent=t.content
      }
    }

    // notepad helpers
    function renderNotepad(){
      const t=tabs.find(x=>x.id===activeId);
      const container=document.getElementById('notesContainer');
      container.innerHTML='';
      if(!t.notepadData) t.notepadData=[];
      t.notepadData.forEach(note=>{
        const wrapper=document.createElement('div');
        wrapper.style.display='flex';
        wrapper.style.alignItems='center';
        wrapper.style.gap='4px';
        const ta=document.createElement('textarea');
        ta.style.flex='1';
        ta.dataset.noteId=note.id;
        ta.value=note.text;
        ta.addEventListener('input',()=>{note.text=ta.value;save();});
        const del=document.createElement('button');
        del.textContent='×';
        del.title='Delete note';
        del.className='small';
        del.onclick=()=>{removeNote(note.id)};
        wrapper.appendChild(ta);
        wrapper.appendChild(del);
        container.appendChild(wrapper);
      });
    }
    function addNote(){
      const t=tabs.find(x=>x.id===activeId);
      if(!t.notepadData) t.notepadData=[];
      const id=uid();
      t.notepadData.push({id,text:''});
      save();
      renderNotepad();
    }
    function removeNote(id){
      const t=tabs.find(x=>x.id===activeId);
      if(!t.notepadData)return;
      t.notepadData=t.notepadData.filter(n=>n.id!==id);
      save();
      renderNotepad();
    }

    function getEditorContent(){
      const t=tabs.find(x=>x.id===activeId);
      if(!t)return'';
      const ed = editors[t.id] || {};
      if(t.mode==='text' && ed.cm)return ed.cm.getValue();
      if(t.mode==='rich' && ed.quill)return ed.quill.root.innerHTML;
      if(t.mode==='notepad'){
        // convert notes array to JSON
        return JSON.stringify(t.notepadData||[]);
      }
      return'';
    }

    function setEditorContent(content){
      const t=tabs.find(x=>x.id===activeId);
      if(!t)return;
      const ed = editors[t.id] = editors[t.id] || {};
      if(t.mode==='text'){
        if(!ed.cm) initCodeMirror(t.id);
        if(ed.cm) ed.cm.setValue(content||'');
      }
      if(t.mode==='rich'){
        if(!ed.quill) initQuill(t.id);
        if(ed.quill) ed.quill.root.innerHTML=content||'';
      }
      if(t.mode==='notepad'){
        try {t.notepadData = JSON.parse(content||'[]');}catch {t.notepadData=[];}
        renderNotepad();
      }
    }

    function initCodeMirror(tabId){
      const ed = editors[tabId] = editors[tabId] || {};
      if(ed.cm && typeof ed.cm.toTextArea === 'function') ed.cm.toTextArea();
      const t = tabs.find(x=>x.id===tabId);
      if(!t)return;
      const lang = t.language || 'plain';
      const textEditorEl = document.getElementById('textEditor');
      textEditorEl.innerHTML='';
      // headless environment (tests) may set a flag to avoid CodeMirror's heavy logic
      if(window.__TEXTGERBIL_HEADLESS){
        let headlessCursor = t.cursor && typeof t.cursor.line==='number' && typeof t.cursor.ch==='number'
          ? {line:t.cursor.line,ch:t.cursor.ch}
          : {line:0,ch:0};
        ed.cm = {
          getValue:()=>t.content||'',
          setValue:(v)=>{t.content=v;},
          on:()=>{},
          setOption:()=>{},
          focus:()=>{window.__TEXTGERBIL_HEADLESS_LAST_FOCUS={tabId,mode:'text'};},
          toTextArea:()=>{},
          getWrapperElement:()=>({style:{}}),
          getCursor:()=>({line:headlessCursor.line,ch:headlessCursor.ch}),
          setCursor:(c)=>{
            if(c && typeof c.line==='number' && typeof c.ch==='number'){
              headlessCursor={line:c.line,ch:c.ch};
            }
          }
        };
        return;
      }
      ed.cm = CodeMirror(textEditorEl,{
        value: t.content||'',
        mode: lang,
        theme: 'monokai',
        lineNumbers: true,
        tabSize: 2,
        indentUnit: 2
      });
      // guard against environments (like JSDOM) where getBoundingClientRect may be missing
      if(ed.cm && ed.cm.display && ed.cm.display.wrapper){
        const wrap = ed.cm.display.wrapper;
        if(typeof wrap.getBoundingClientRect !== 'function'){
          wrap.getBoundingClientRect = ()=>({left:0,top:0,right:0,bottom:0,width:0,height:0});
        }
      }
      ed.cm.on('change',()=>{
        const tab=tabs.find(x=>x.id===tabId);
        if(tab){tab.content=ed.cm.getValue(); save(); updatePreview()}
      });
    }

    function initQuill(tabId){
      const ed = editors[tabId] = editors[tabId] || {};
      const t = tabs.find(x=>x.id===tabId);
      const richEditorEl = document.getElementById('richEditor');
      richEditorEl.innerHTML='<div id="quill-root"></div>';
      if(window.__TEXTGERBIL_HEADLESS){
        // simple stub with minimal interface
        ed.quill = {
          root:{innerHTML: t.content||''},
          on:()=>{},
          focus:()=>{window.__TEXTGERBIL_HEADLESS_LAST_FOCUS={tabId,mode:'rich'};}
        };
        return;
      }
      ed.quill = new Quill('#quill-root',{
        theme: 'snow',
        placeholder: 'Start typing...',
        modules: {toolbar: [[{header:[1,2,false]}],['bold','italic','underline'],['link','blockquote','code-block'],[{list:'ordered'},{list:'bullet'}]]}
      });
      if(t && t.content) ed.quill.root.innerHTML=t.content;
      ed.quill.on('text-change',()=>{
        if(t){t.content=ed.quill.root.innerHTML; save(); updatePreview()}
      });
    }

    function applyPreviewVisibility(tab){
      const preview = document.getElementById('preview');
      const handle = document.getElementById('previewResizeHandle');
      if(!preview || !handle)return;
      const canPreview = canTabPreview(tab);
      const shouldShow = !!canPreview && !!tab.previewVisible;
      if(tab) applyPreviewWidth(tab);
      preview.classList.toggle('hidden',!shouldShow);
      handle.classList.toggle('hidden',!shouldShow);
    }

    function initPreviewResize(){
      const handle = document.getElementById('previewResizeHandle');
      const main = document.querySelector('main');
      if(!handle || !main)return;
      let dragging = false;
      let pointerId = null;

      const stopDragging = ()=>{
        dragging = false;
        pointerId = null;
      };

      handle.addEventListener('pointerdown',(ev)=>{
        if(ev.button !== 0)return;
        const t=tabs.find(x=>x.id===activeId);
        const preview=document.getElementById('preview');
        if(!t || !canTabPreview(t) || !preview || preview.classList.contains('hidden'))return;
        dragging = true;
        pointerId = ev.pointerId;
        if(typeof handle.setPointerCapture==='function'){
          try {handle.setPointerCapture(pointerId);}catch {/* ignore capture errors */}
        }
        ev.preventDefault();
      });

      handle.addEventListener('pointermove',(ev)=>{
        if(!dragging || (pointerId!==null && ev.pointerId!==pointerId))return;
        const t=tabs.find(x=>x.id===activeId);
        if(!t || !canTabPreview(t))return;
        const mainRect = main.getBoundingClientRect();
        const desiredWidth = mainRect.right - ev.clientX;
        t.previewWidth = clampPreviewWidthForTab(t,desiredWidth);
        applyPreviewWidth(t);
        save();
      });

      handle.addEventListener('pointerup',stopDragging);
      handle.addEventListener('pointercancel',stopDragging);
    }

    function canTabPreview(tab){
      if(!tab || tab.mode!=='text')return false;
      if(tab.language==='markdown' || tab.language==='htmlmixed')return canUseSecureIframePreview();
      if(tab.language==='json')return!!window.JSONFormatter;
      return false;
    }

    function switchEditorMode(mode,tabId){
      const els = document.querySelectorAll('.editor-instance');
      els.forEach(e=>e.classList.remove('active'));
      const t = tabs.find(x=>x.id===tabId);
      applyPreviewVisibility(t);
      syncPreviewToggleState();
      document.getElementById('languageSelect').style.display = mode==='text' ? 'inline-block' : 'none';
      if(mode==='text'){
        document.getElementById('textEditor').classList.add('active');
        initCodeMirror(tabId);
      }else if(mode==='rich'){
        document.getElementById('richEditor').classList.add('active');
      }else if(mode==='notepad'){
        document.getElementById('notepadEditor').classList.add('active');
      }
    }

    function applyThemeToEditor(theme){
      if(!theme)return;
      // determine which element is currently visible for styling
      const t = tabs.find(x=>x.id===activeId);
      if(!t)return;
      let target = null;
      if(t.mode==='text'){
        const ed = editors[t.id];
        if(ed && ed.cm && typeof ed.cm.getWrapperElement==='function') target = ed.cm.getWrapperElement();
        else target = document.getElementById('textEditor');
      }else if(t.mode==='rich'){
        const ed = editors[t.id];
        if(ed && ed.quill) target = ed.quill.root;
      }else if(t.mode==='notepad'){
        // notepad theme applies to notes container
        target = document.getElementById('notesContainer');
      }
      if(!target)return;
      if(theme.fontFamily) target.style.fontFamily=theme.fontFamily;
      if(theme.fontSize) target.style.fontSize=theme.fontSize+'px';
      if(theme.bg) target.style.background=theme.bg;
      if(theme.fg) target.style.color=theme.fg;
    }

    // helpers
    function populateThemeInputs(){
      const t=tabs.find(x=>x.id===activeId);
      const theme = t && t.theme ? t.theme : globalTheme || {};
      document.getElementById('fontFamily').value=theme.fontFamily||'';
      document.getElementById('fontSize').value=theme.fontSize||14;
      document.getElementById('bgColor').value=theme.bg||'#ffffff';
      document.getElementById('fgColor').value=theme.fg||'#111111';
    }

    function syncPreviewToggleState(){
      const preview=document.getElementById('preview');
      const btn=document.getElementById('togglePreview');
      if(!preview||!btn)return;
      const t=tabs.find(x=>x.id===activeId);
      const canPreview=canTabPreview(t);
      btn.disabled=!canPreview;
      const isHtmlOrMarkdown=!!(t && t.mode==='text' && (t.language==='markdown' || t.language==='htmlmixed'));
      const jsonReady=!!window.JSONFormatter;
      const secureReady=canUseSecureIframePreview();
      if(canPreview){
        btn.title='Toggle preview';
      }else if(isHtmlOrMarkdown && !secureReady){
        btn.title='Preview disabled: browser lacks secure iframe support (sandbox + srcdoc)';
      }else {
        btn.title=jsonReady?'Preview available only for Markdown/HTML/JSON':'Preview available only for Markdown/HTML (JSON formatter unavailable)';
      }
      const isVisible=!preview.classList.contains('hidden');
      btn.classList.toggle('is-active',isVisible);
      btn.setAttribute('aria-pressed',String(isVisible));
    }

    // UI wiring
    document.getElementById('addTab').onclick=()=>{newTab('text')}
    document.getElementById('addNoteBtn').addEventListener('click',()=>{addNote()});
    document.getElementById('modeSelect').addEventListener('change',e=>{
      const t=tabs.find(x=>x.id===activeId);
      if(t){
        saveCurrentEditor();
        t.mode=e.target.value;
        if(t.mode==='text' && !t.language) t.language='plain';
        switchEditorMode(t.mode,t.id);
        setEditorContent(t.content);
        save();
        updatePreview();
      }
    })
    document.getElementById('languageSelect').addEventListener('change',e=>{
      const t=tabs.find(x=>x.id===activeId);
      if(t && t.mode==='text'){
        t.language=e.target.value;
        if(!canTabPreview(t)){
          t.previewVisible=false;
        }
        if(editors[t.id] && editors[t.id].cm){
          editors[t.id].cm.setOption('mode',t.language);
        }
        save();
        updatePreview();
        applyPreviewVisibility(t);
        syncPreviewToggleState();
      }
    })
    document.getElementById('togglePreview').onclick=()=>{
      const t=tabs.find(x=>x.id===activeId);
      if(!canTabPreview(t))return;
      t.previewVisible = !t.previewVisible;
      applyPreviewVisibility(t);
      save();
      syncPreviewToggleState();
    }
    document.getElementById('exportBtn').onclick=()=>exportCurrent();
    document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
    document.getElementById('importFile').addEventListener('change',handleImport);
    document.getElementById('themeBtn').onclick=()=>{
      const p=document.getElementById('settingsPanel');
      if(p.style.display==='none') populateThemeInputs();
      p.style.display=p.style.display==='none'?'block':'none';
    }
    document.getElementById('applyTheme').onclick=()=>{
      const t=tabs.find(x=>x.id===activeId);if(!t)return;
      t.theme={fontFamily:document.getElementById('fontFamily').value,fontSize:document.getElementById('fontSize').value,bg:document.getElementById('bgColor').value,fg:document.getElementById('fgColor').value};
      applyThemeToEditor(t.theme);save();
    }
    document.getElementById('applyGlobal').onclick=()=>{
      const theme={fontFamily:document.getElementById('fontFamily').value,fontSize:document.getElementById('fontSize').value,bg:document.getElementById('bgColor').value,fg:document.getElementById('fgColor').value};
      tabs.forEach(t=>t.theme=Object.assign({},theme));
      globalTheme=Object.assign({},theme);
      applyThemeToEditor(tabs.find(x=>x.id===activeId).theme);
      save();
    }

    // Initialization
    if(!load()){tabs=[];}
    if(!Array.isArray(tabs)) tabs=[];
    tabs=tabs.map(normalizeLoadedTab).filter(Boolean);
    if(globalTheme){
      tabs.forEach(t=>{
        if(!t.theme || Object.keys(t.theme).length===0){
          t.theme=Object.assign({},globalTheme);
        }
      });
    }
    ensureAtLeastOne();
    if(!tabs.find(x=>x.id===activeId)) activeId=tabs[0].id;
    initMarkdownIt();
    initPreviewResize();
    renderTabs();
    selectTab(activeId);
    syncPreviewToggleState();

    // import/export helpers
    function exportCurrent(){
      const t=tabs.find(x=>x.id===activeId);
      if(!t)return;
      const blob=new Blob([t.content||''],{type:'text/plain'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=(t.title||'untitled')+'.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    }
    function handleImport(e){
      const file=e.target.files[0];
      if(!file)return;
      const reader=new FileReader();
      reader.onload=()=>{
        const text=reader.result;
        // open in new tab
        const newId=uid();
        const t={id:newId,title:file.name,mode:'plain',content:text,theme:{},previewVisible:false,previewWidth:DEFAULT_PREVIEW_WIDTH};
        if(globalTheme) t.theme=Object.assign({},globalTheme);
        tabs.push(t);
        activeId=newId;
        renderTabs();
        selectTab(activeId);
        save();
      };
      reader.readAsText(file);
      e.target.value='';
    }
    // keyboard shortcuts
    document.addEventListener('keydown',ev=>{
      const cmd = ev.metaKey||ev.ctrlKey;
      if(!cmd)return;
      switch(ev.key.toLowerCase()){
        case 's': ev.preventDefault(); exportCurrent(); break;
        case 'o': ev.preventDefault(); document.getElementById('importBtn').click(); break;
        case 't': ev.preventDefault(); newTab(document.getElementById('modeSelect').value); break;
        case 'w': ev.preventDefault(); closeTab(activeId); break;
      }
    });

    // expose for debugging
    window.__textgerbil = {
      tabs,
      save,
      load,
      newTab,
      closeTab,
      selectTab,
      editors,
      initCodeMirror,
      initQuill,
      exportCurrent,
      detectLanguageFromTitle,
      renderTabs,
      updatePreview,
      syncPreviewToggleState,
      getPreviewSupport,
      canUseSecureIframePreview,
      setPreviewSupportOverride:(override)=>{previewSupportOverride=override||null; syncPreviewToggleState(); updatePreview();},
      setMarkdownRendererForTest:(renderer)=>{md=renderer||null; updatePreview();},
      getActiveTabPreviewWidth:()=>{
        const t=tabs.find(x=>x.id===activeId);
        return t ? t.previewWidth : null;
      },
      setActiveTabPreviewWidth:(width)=>{
        const t=tabs.find(x=>x.id===activeId);
        if(!t)return;
        t.previewWidth = clampPreviewWidthForTab(t,width);
        applyPreviewWidth(t);
        save();
      }
    }
  </script>
</body>
</html>
